<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krew3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif;user-select:none;cursor:crosshair}

#info-panel{position:fixed;top:10px;left:10px;background:rgba(0,0,0,.55);color:#fff;padding:8px 12px;border-radius:8px;font-size:10px;border:1px solid rgba(255,255,255,.1);line-height:1.7;z-index:10;display:none}
#info-panel kbd{background:rgba(255,255,255,.12);padding:1px 4px;border-radius:3px;font-size:9px}

#gold-display{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#f1c40f;font-size:14px;font-weight:bold;padding:5px 18px;border-radius:8px;z-index:10;display:none;border:1px solid rgba(241,196,15,.3)}

#health-wrap{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);width:260px;height:20px;background:rgba(0,0,0,.55);border:2px solid rgba(255,255,255,.2);border-radius:10px;overflow:hidden;z-index:10;display:none}
#health-bar{height:100%;width:100%;background:#2ecc71;transition:width .3s;border-radius:10px}
#health-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-weight:bold;font-size:11px;text-shadow:1px 1px 2px #000}

#sails-ind{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);color:#fff;font-size:11px;z-index:10;display:none;background:rgba(0,0,0,.4);padding:2px 10px;border-radius:6px}

#action-prompt{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);color:#f1c40f;font-size:14px;font-weight:bold;z-index:10;display:none;background:rgba(0,0,0,.6);padding:6px 16px;border-radius:8px}

#minimap{position:fixed;bottom:15px;right:15px;width:200px;height:200px;background:rgba(10,30,60,.85);border:2px solid rgba(255,255,255,.2);border-radius:8px;z-index:10;display:none;cursor:pointer}
#tp-hint{position:fixed;bottom:220px;right:15px;color:rgba(255,255,255,.35);font-size:9px;z-index:10;display:none;width:200px;text-align:center}

#score-board{position:fixed;top:10px;right:10px;background:rgba(0,0,0,.5);color:#fff;padding:8px 14px;border-radius:8px;font-size:11px;z-index:10;display:none;border:1px solid rgba(255,255,255,.1);max-height:200px}
#score-board h3{margin-bottom:4px;color:#f1c40f;font-size:12px}
.sr{display:flex;justify-content:space-between;gap:14px;padding:1px 0}.sr.me{color:#2ecc71;font-weight:bold}

#state-label{position:fixed;top:80px;left:10px;color:rgba(255,255,255,.5);font-size:10px;z-index:10;display:none;background:rgba(0,0,0,.3);padding:2px 6px;border-radius:4px}
#player-count{position:fixed;bottom:4px;left:10px;color:rgba(255,255,255,.35);font-size:9px;z-index:10;display:none}

#conn-status{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#f1c40f;padding:12px 24px;border-radius:8px;font-size:14px;z-index:200;display:none}

#death-screen{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;z-index:100;flex-direction:column;color:#fff}
#death-screen h1{font-size:40px;color:#e74c3c;margin-bottom:6px}

#name-wrap{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;background:rgba(0,0,0,.88);padding:24px 32px;border-radius:12px;text-align:center;color:#fff;border:2px solid rgba(241,196,15,.4)}
#name-wrap h2{color:#f1c40f;margin-bottom:10px;font-size:24px}
#name-input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 12px;border-radius:6px;font-size:14px;outline:none;width:180px;text-align:center}
#name-input::placeholder{color:rgba(255,255,255,.3)}
#name-btn{display:block;margin:8px auto 0;padding:8px 24px;background:#f1c40f;color:#000;border:none;border-radius:6px;font-size:13px;font-weight:bold;cursor:pointer}

#market{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:150;display:none;justify-content:center;align-items:center}
#market-inner{background:rgba(20,20,30,.95);border:2px solid rgba(241,196,15,.4);border-radius:14px;padding:24px 30px;color:#fff;min-width:460px}
#market-inner h2{color:#f1c40f;margin-bottom:4px;font-size:18px}
#market-gold{color:#f1c40f;margin-bottom:12px;font-size:13px}
.ship-card{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;margin-bottom:6px}
.ship-info h3{font-size:13px;margin-bottom:2px}.ship-info p{font-size:10px;opacity:.6}
.ship-btn{padding:5px 14px;border:none;border-radius:5px;font-size:11px;font-weight:bold;cursor:pointer;min-width:70px}
.ship-btn.buy{background:#f1c40f;color:#000}.ship-btn.owned{background:#2ecc71;color:#000}
.ship-btn.equip{background:#3498db;color:#fff}.ship-btn.equipped{background:#555;color:#aaa;cursor:default}
#market-close{display:block;margin:10px auto 0;padding:5px 18px;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:5px;cursor:pointer;font-size:11px}
#shop-msg{color:#2ecc71;font-size:11px;text-align:center;margin-top:4px;min-height:14px}
</style>
</head>
<body>
<div id="name-wrap">
  <h2>KREW 3D</h2>
  <p style="margin-bottom:10px;opacity:.5;font-size:11px">Enter your pirate name</p>
  <input id="name-input" type="text" placeholder="Captain..." maxlength="16" autofocus>
  <button id="name-btn">SET SAIL!</button>
</div>
<div id="conn-status"></div>
<div id="info-panel"><strong style="color:#f1c40f">Controls</strong><br><kbd>W</kbd><kbd>S</kbd><kbd>A</kbd><kbd>D</kbd> Move/Turn<br><kbd>Mouse</kbd> Aim · <kbd>Click</kbd> Fire<br><kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> Sails · <kbd>E</kbd> Board/Leave<br><kbd>Space</kbd> Jump · <kbd>B</kbd> Shop (on land)</div>
<div id="gold-display"></div>
<div id="sails-ind"></div>
<div id="health-wrap"><div id="health-bar"></div><div id="health-text"></div></div>
<div id="action-prompt"></div>
<canvas id="minimap" width="200" height="200"></canvas>
<div id="tp-hint">Click map to teleport</div>
<div id="score-board"><h3>Scoreboard</h3><div id="score-list"></div></div>
<div id="state-label"></div>
<div id="player-count"></div>
<div id="death-screen"><h1>SUNK!</h1><p id="death-msg"></p><p style="margin-top:10px;opacity:.4;font-size:12px">Respawning...</p></div>
<div id="market"><div id="market-inner"><h2>Ship Market</h2><div id="market-gold"></div><div id="ship-list"></div><div id="shop-msg"></div><button id="market-close">Close [B]</button></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
/* ── GLOBALS ── */
let socket,scene,camera,renderer,clock;
let myId=null,mapSize=1600,islandsData=[],obstaclesData=[],shipDefs={};
let waterMesh,aimMarker,landingDots=[];
let ents={},cbPool=[];
let gs={players:{},cannonballs:[]};
let keys={},mouseX=window.innerWidth/2,mouseY=window.innerHeight/2,mWorld={x:0,z:0};
let started=false,pName='Pirate',marketOpen=false;
let myGold=5000,myOwned=['rowboat'],myShipType='rowboat';
let spawnData=null; // set from init
let sceneReady=false;

const ray=new THREE.Raycaster();
const m2=new THREE.Vector2();
const wPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
const mmCtx=document.getElementById('minimap').getContext('2d');

/* ── START ── */
document.getElementById('name-btn').onclick=go;
document.getElementById('name-input').onkeydown=e=>{if(e.key==='Enter')go()};
function go(){
  pName=document.getElementById('name-input').value.trim()||'Pirate';
  document.getElementById('name-wrap').style.display='none';
  ['info-panel','health-wrap','score-board','sails-ind','minimap','player-count','state-label','gold-display','tp-hint'].forEach(i=>document.getElementById(i).style.display='block');
  started=true;
  initThree();
  initSocket();
  tick();
}

/* ── THREE SETUP ── */
function initThree(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0xadd8f0); // light sky blue
  scene.fog=new THREE.FogExp2(0x8abbd4,0.0008);

  camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,1,3000);
  // Default camera - will be overridden by spawn data
  camera.position.set(0,40,-60);
  camera.lookAt(0,0,0);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setClearColor(0xadd8f0);
  document.body.appendChild(renderer.domElement);
  clock=new THREE.Clock();

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff,0.5));
  const sun=new THREE.DirectionalLight(0xfff5d0,1.0);
  sun.position.set(400,500,200);scene.add(sun);
  scene.add(new THREE.HemisphereLight(0xadd8f0,0x3a7a5a,0.3));

  // Water - DARK blue, high contrast with sky
  waterMesh=new THREE.Mesh(
    new THREE.PlaneGeometry(5000,5000,80,80),
    new THREE.MeshPhongMaterial({color:0x0a4870,transparent:true,opacity:0.92,shininess:70,specular:0x155a80})
  );
  waterMesh.rotation.x=-Math.PI/2;
  waterMesh.position.y=0;
  scene.add(waterMesh);

  // Aim marker
  aimMarker=new THREE.Mesh(
    new THREE.RingGeometry(1.5,2.2,20),
    new THREE.MeshBasicMaterial({color:0xff3333,transparent:true,opacity:0.6,side:THREE.DoubleSide})
  );
  aimMarker.rotation.x=-Math.PI/2;aimMarker.position.y=0.5;aimMarker.visible=false;
  scene.add(aimMarker);

  // Landing indicators for warship
  for(let i=0;i<3;i++){
    const d=new THREE.Mesh(new THREE.RingGeometry(1,1.8,14),new THREE.MeshBasicMaterial({color:0xff6600,transparent:true,opacity:0.5,side:THREE.DoubleSide}));
    d.rotation.x=-Math.PI/2;d.position.y=0.3;d.visible=false;scene.add(d);landingDots.push(d);
  }

  window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});

  // Keys
  window.addEventListener('keydown',e=>{
    if(!started)return;
    if(marketOpen){if(e.code==='KeyB')toggleMarket();return;}
    keys[e.code]=true;
    if(e.code==='Digit1')socket?.emit('setSails',0);
    if(e.code==='Digit2')socket?.emit('setSails',1);
    if(e.code==='Digit3')socket?.emit('setSails',2);
    if(e.code==='KeyB')toggleMarket();
    if(e.code==='Space')e.preventDefault();
  });
  window.addEventListener('keyup',e=>{keys[e.code]=false});
  window.addEventListener('blur',()=>{keys={}});

  // Mouse
  window.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY});
  window.addEventListener('mousedown',e=>{if(!marketOpen&&started&&e.button===0)socket?.emit('fire')});

  // Minimap teleport
  document.getElementById('minimap').addEventListener('click',e=>{
    const r=e.target.getBoundingClientRect();
    const mx=(e.clientX-r.left)/200,mz=(e.clientY-r.top)/200;
    socket?.emit('teleport',{x:(mx-0.5)*mapSize,z:(mz-0.5)*mapSize});
  });

  document.getElementById('market-close').onclick=()=>toggleMarket();

  console.log('Three.js initialized');
}

function toggleMarket(){
  const me=gs.players[myId];
  if(!me)return;
  if(!marketOpen&&me.onBoat)return; // only on land
  marketOpen=!marketOpen;
  document.getElementById('market').style.display=marketOpen?'flex':'none';
  if(marketOpen)updateMarketUI();
}

/* ── BUILD SCENE FROM INIT DATA ── */
function buildScene(data){
  if(sceneReady)return;
  islandsData=data.islands;
  obstaclesData=data.obstacles||[];
  mapSize=data.mapSize;
  shipDefs=data.ships||{};

  // Islands
  for(const d of islandsData){
    const g=new THREE.Group();
    // Land platform
    g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(d.radius*0.92,d.radius,3.5,24),new THREE.MeshPhongMaterial({color:0x4a8a3a,flatShading:true})),{position:new THREE.Vector3(0,1.8,0)}));
    // Beach
    g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(d.radius,d.radius+10,2,24),new THREE.MeshPhongMaterial({color:0xf0d9a0})),{position:new THREE.Vector3(0,0.6,0)}));
    // Hills
    for(let i=0;i<3;i++){
      const r=d.radius*(0.15+Math.random()*0.2);
      const h=new THREE.Mesh(new THREE.SphereGeometry(r,8,6),new THREE.MeshPhongMaterial({color:0x3d7a30,flatShading:true}));
      const a=Math.random()*Math.PI*2,dist=Math.random()*d.radius*0.4;
      h.position.set(Math.cos(a)*dist,r*0.35+2.5,Math.sin(a)*dist);h.scale.y=0.45;g.add(h);
    }
    // Trees
    for(let i=0;i<5+Math.floor(d.radius/15);i++){
      const a=Math.random()*Math.PI*2,dist=5+Math.random()*(d.radius-15);
      const t=new THREE.Group();
      t.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.35,6,6),new THREE.MeshPhongMaterial({color:0x8B6914})),{position:new THREE.Vector3(0,3,0)}));
      for(let j=0;j<5;j++){const la=(j/5)*Math.PI*2;const lf=new THREE.Mesh(new THREE.ConeGeometry(1.8,3,4),new THREE.MeshPhongMaterial({color:0x228B22,flatShading:true}));lf.position.set(Math.cos(la)*1,6.5,Math.sin(la)*1);lf.rotation.set(Math.sin(la)*.6,0,Math.cos(la)*.6);t.add(lf);}
      t.position.set(Math.cos(a)*dist,2.8,Math.sin(a)*dist);t.scale.setScalar(0.5+Math.random()*0.4);g.add(t);
    }
    g.position.set(d.x,0,d.z);scene.add(g);
  }

  // Obstacles (rocks)
  for(const ob of obstaclesData){
    const m=new THREE.Mesh(new THREE.SphereGeometry(ob.radius,6,5),new THREE.MeshPhongMaterial({color:0x666655,flatShading:true}));
    m.position.set(ob.x,3+ob.radius*0.4,ob.z);m.scale.y=0.5;scene.add(m);
  }

  sceneReady=true;
  console.log('Scene built:',islandsData.length,'islands');
}

/* ── SHIP MODELS ── */
function mkRowboat(){
  const g=new THREE.Group();
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(3,1.2,8),new THREE.MeshPhongMaterial({color:0x8B6914})),{position:new THREE.Vector3(0,0.7,0)}));
  for(const s of[-1,1])g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.25,1,8.2),new THREE.MeshPhongMaterial({color:0x6B4E12})),{position:new THREE.Vector3(s*1.6,1.4,0)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.ConeGeometry(1.7,2.5,4),new THREE.MeshPhongMaterial({color:0x8B6914})),{position:new THREE.Vector3(0,0.8,5),rotation:new THREE.Euler(Math.PI/2,0,0)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(3.2,1.6,0.3),new THREE.MeshPhongMaterial({color:0x6B4E12})),{position:new THREE.Vector3(0,1.2,-4.2)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.13,6,6),new THREE.MeshPhongMaterial({color:0x543210})),{position:new THREE.Vector3(0,4.2,-1)}));
  const sail=new THREE.Mesh(new THREE.PlaneGeometry(2.8,3.8),new THREE.MeshPhongMaterial({color:0xf0e8d0,side:THREE.DoubleSide,transparent:true,opacity:0.85}));
  sail.position.set(0,5.5,-0.8);sail.name='sail';g.add(sail);
  g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.4,0.4,8),new THREE.MeshPhongMaterial({color:0x333})),{position:new THREE.Vector3(0,1.5,3)}));
  const brl=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.2,2,8),new THREE.MeshPhongMaterial({color:0x1a1a1a}));
  brl.rotation.x=Math.PI/2;brl.position.set(0,1.7,4.2);brl.name='cannonBarrel';g.add(brl);
  return g;
}
function mkWarship(){
  const g=new THREE.Group();
  const hs=new THREE.Shape();hs.moveTo(0,-10);hs.quadraticCurveTo(5,-8,5.5,0);hs.quadraticCurveTo(5.5,8,3,10);hs.lineTo(-3,10);hs.quadraticCurveTo(-5.5,8,-5.5,0);hs.quadraticCurveTo(-5,-8,0,-10);
  const hull=new THREE.Mesh(new THREE.ExtrudeGeometry(hs,{depth:4,bevelEnabled:true,bevelSize:0.5,bevelThickness:0.3}),new THREE.MeshPhongMaterial({color:0x5a3015}));
  hull.rotation.x=-Math.PI/2;hull.position.y=1;g.add(hull);
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(9,0.3,18),new THREE.MeshPhongMaterial({color:0xC4A060})),{position:new THREE.Vector3(0,3.8,0)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(8,2,5),new THREE.MeshPhongMaterial({color:0x6B3E1A})),{position:new THREE.Vector3(0,4.5,-7)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(6,1.5,3),new THREE.MeshPhongMaterial({color:0x6B3E1A})),{position:new THREE.Vector3(0,4.2,8)}));
  for(const z of[-2,4]){
    g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.25,14,8),new THREE.MeshPhongMaterial({color:0x543210})),{position:new THREE.Vector3(0,11,z)}));
    const s=new THREE.Mesh(new THREE.PlaneGeometry(6,8),new THREE.MeshPhongMaterial({color:0xe8dfc8,side:THREE.DoubleSide,transparent:true,opacity:0.85}));
    s.position.set(0,13,z+0.3);s.name=z===-2?'sail':'sail2';g.add(s);
  }
  for(const side of[-1,1])for(let i=-1;i<=1;i++){const c=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.3,1.8,6),new THREE.MeshPhongMaterial({color:0x222}));c.rotation.z=side*Math.PI/2;c.position.set(side*5,3.8,i*4);g.add(c);}
  g.add(Object.assign(new THREE.Mesh(new THREE.PlaneGeometry(2,1.2),new THREE.MeshPhongMaterial({color:0x111,side:THREE.DoubleSide})),{position:new THREE.Vector3(0,18.5,-2)}));
  return g;
}
function mkTrade(){
  const g=new THREE.Group();
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(6,2.5,14),new THREE.MeshPhongMaterial({color:0x6B4E12})),{position:new THREE.Vector3(0,1.5,0)}));
  for(const s of[-1,1])g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.3,2,14.5),new THREE.MeshPhongMaterial({color:0x543210})),{position:new THREE.Vector3(s*3.15,2.8,0)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.ConeGeometry(3.2,4,4),new THREE.MeshPhongMaterial({color:0x6B4E12})),{position:new THREE.Vector3(0,1.5,9),rotation:new THREE.Euler(Math.PI/2,0,0)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(5.5,0.2,13),new THREE.MeshPhongMaterial({color:0xC4A060})),{position:new THREE.Vector3(0,3,0)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(4,2.5,4),new THREE.MeshPhongMaterial({color:0x7a5020})),{position:new THREE.Vector3(0,4.5,-4.5)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.22,12,8),new THREE.MeshPhongMaterial({color:0x543210})),{position:new THREE.Vector3(0,9.5,1)}));
  const s1=new THREE.Mesh(new THREE.PlaneGeometry(7,9),new THREE.MeshPhongMaterial({color:0xe8dfc8,side:THREE.DoubleSide,transparent:true,opacity:0.85}));
  s1.position.set(0,11,2);s1.rotation.y=0.2;s1.name='sail';g.add(s1);
  const brl=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.2,2.2,8),new THREE.MeshPhongMaterial({color:0x1a1a1a}));
  brl.rotation.x=Math.PI/2;brl.position.set(0,3.5,6.8);brl.name='cannonBarrel';g.add(brl);
  return g;
}
function mkChar(isMe){
  const g=new THREE.Group(),c=isMe?0x2e86c1:0xc0392b;
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.9,1.5,0.6),new THREE.MeshPhongMaterial({color:c})),{position:new THREE.Vector3(0,2.3,0)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.SphereGeometry(0.38,8,8),new THREE.MeshPhongMaterial({color:0xf0c090})),{position:new THREE.Vector3(0,3.4,0)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.45,0.45,8),new THREE.MeshPhongMaterial({color:0x1a1a1a})),{position:new THREE.Vector3(0,3.9,0)}));
  for(const s of[-0.22,0.22]){const l=new THREE.Mesh(new THREE.BoxGeometry(0.3,1,0.35),new THREE.MeshPhongMaterial({color:0x4a3520}));l.position.set(s,0.9,0);l.name=s<0?'legL':'legR';g.add(l);}
  for(const s of[-0.6,0.6]){const a=new THREE.Mesh(new THREE.BoxGeometry(0.25,1,0.25),new THREE.MeshPhongMaterial({color:c}));a.position.set(s,2.3,0);a.name=s<0?'armL':'armR';g.add(a);}
  return g;
}
function mkName(name,isMe){
  const c=document.createElement('canvas');c.width=256;c.height=40;
  const x=c.getContext('2d');
  x.fillStyle=isMe?'rgba(46,134,193,.65)':'rgba(0,0,0,.5)';
  x.beginPath();x.roundRect(4,2,248,36,5);x.fill();
  x.fillStyle='#fff';x.font='bold 18px sans-serif';x.textAlign='center';x.fillText(name,128,28);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true}));
  s.scale.set(10,2.5,1);return s;
}

/* ── ENTITY ── */
function getEnt(id){
  if(!ents[id]){
    const isMe=id===myId;
    const ch=mkChar(isMe);scene.add(ch);
    const nt=mkName('...',isMe);nt.position.y=5.5;
    ents[id]={boat:null,bType:null,char:ch,nTag:nt,lName:'',nOn:null};
  }
  return ents[id];
}
function ensureBoat(e,type){
  if(e.bType===type)return;
  if(e.boat)scene.remove(e.boat);
  e.boat=type==='warship'?mkWarship():type==='tradeship'?mkTrade():mkRowboat();
  scene.add(e.boat);e.bType=type;
}
function rmEnt(id){const e=ents[id];if(!e)return;if(e.boat)scene.remove(e.boat);scene.remove(e.char);if(e.nTag.parent)e.nTag.parent.remove(e.nTag);delete ents[id];}

/* ── SOCKET ── */
function initSocket(){
  const st=document.getElementById('conn-status');
  socket=io({reconnection:true,reconnectionDelay:1000,transports:['websocket','polling']});

  socket.on('connect',()=>{st.style.display='none';console.log('Connected:',socket.id)});
  socket.on('disconnect',()=>{st.textContent='Reconnecting...';st.style.display='block';keys={}});

  socket.on('init',data=>{
    console.log('Init received, id:',data.id,'spawn:',data.spawn);
    const old=myId;
    myId=data.id;
    spawnData=data.spawn;

    // Position camera at spawn immediately
    if(spawnData){
      const sd=spawnData;
      camera.position.set(sd.x-Math.sin(sd.rot)*45, 25, sd.z-Math.cos(sd.rot)*45);
      camera.lookAt(sd.x,0,sd.z);
    }

    buildScene(data);
    if(old&&old!==myId)rmEnt(old);
    socket.emit('setName',pName);
  });

  socket.on('playerLeft',rmEnt);
  socket.on('state',s=>{gs=s});
  socket.on('sunk',d=>{
    document.getElementById('death-msg').textContent=`Sunk by ${d.by}!`;
    document.getElementById('death-screen').style.display='flex';
    setTimeout(()=>document.getElementById('death-screen').style.display='none',2500);
  });
  socket.on('shopMsg',m=>{document.getElementById('shop-msg').textContent=m});
  socket.on('updatePlayer',d=>{
    if(d.gold!==undefined)myGold=d.gold;
    if(d.ownedShips)myOwned=d.ownedShips;
    if(d.shipType)myShipType=d.shipType;
    if(marketOpen)updateMarketUI();
  });

  setInterval(()=>{if(socket?.connected)socket.emit('heartbeat')},5000);
}

/* ── MARKET UI ── */
function updateMarketUI(){
  const me=gs.players[myId];
  if(me){myGold=me.gold;myShipType=me.shipType;myOwned=me.ownedShips||myOwned;}
  document.getElementById('market-gold').textContent='Gold: '+myGold;
  const list=document.getElementById('ship-list');list.innerHTML='';
  for(const[type,def]of Object.entries(shipDefs)){
    const owned=myOwned.includes(type),eq=myShipType===type,canBuy=myGold>=def.price;
    let bc,bt;
    if(eq){bc='equipped';bt='Equipped';}else if(owned){bc='equip';bt='Equip';}else if(canBuy){bc='buy';bt='Buy '+def.price+'g';}else{bc='equipped';bt=def.price+'g';}
    const ci=def.cannons==='side'?def.cannonCount+' side cannons':'Front cannon';
    const card=document.createElement('div');card.className='ship-card';
    card.innerHTML=`<div class="ship-info"><h3>${def.name}</h3><p>HP:${def.hp} Spd:${Math.round(def.speed*100)} ${ci}</p></div><button class="ship-btn ${bc}" data-t="${type}">${bt}</button>`;
    list.appendChild(card);
    card.querySelector('button').onclick=()=>{if(eq)return;if(owned)socket.emit('switchShip',type);else socket.emit('buyShip',type);};
  }
}

/* ── AIM ── */
function updateAim(){
  m2.x=(mouseX/innerWidth)*2-1;m2.y=-(mouseY/innerHeight)*2+1;
  ray.setFromCamera(m2,camera);
  const hit=new THREE.Vector3();
  if(ray.ray.intersectPlane(wPlane,hit)){mWorld.x=hit.x;mWorld.z=hit.z;socket?.emit('aim',{x:hit.x,z:hit.z});}
}

/* ── CB POOL ── */
const cbG=new THREE.SphereGeometry(0.4,6,6),cbM=new THREE.MeshPhongMaterial({color:0x1a1a1a});
function getCB(i){while(cbPool.length<=i){const m=new THREE.Mesh(cbG,cbM);m.visible=false;scene.add(m);cbPool.push(m);}return cbPool[i];}

/* ── MAIN LOOP ── */
function tick(){
  requestAnimationFrame(tick);
  const t=clock.getElapsedTime();

  // Input
  if(socket?.connected&&myId&&!marketOpen){
    socket.volatile.emit('input',{
      forward:!!(keys.KeyW||keys.ArrowUp),backward:!!(keys.KeyS||keys.ArrowDown),
      left:!!(keys.KeyA||keys.ArrowLeft),right:!!(keys.KeyD||keys.ArrowRight),
      action:!!keys.KeyE,jump:!!keys.Space,
    });
  }

  updateAim();

  // Water wave
  const wp=waterMesh.geometry.attributes.position;
  for(let i=0;i<wp.count;i++){
    const x=wp.getX(i),y=wp.getY(i);
    wp.setZ(i,Math.sin(x*0.018+t*1.1)*0.6+Math.sin(y*0.022+t*0.9)*0.5+Math.sin((x+y)*0.01+t*0.6)*0.7);
  }
  wp.needsUpdate=true;waterMesh.geometry.computeVertexNormals();

  // Entities
  const active=new Set();
  for(const id in gs.players){
    active.add(id);
    const p=gs.players[id],e=getEnt(id),isMe=id===myId;
    ensureBoat(e,p.shipType);

    // Boat lerp
    e.boat.position.x+=(p.bx-e.boat.position.x)*0.15;
    e.boat.position.z+=(p.bz-e.boat.position.z)*0.15;
    e.boat.position.y=Math.sin(t*1.8+p.bx*0.07)*0.35+0.5;
    let bd=p.bRot-e.boat.rotation.y;while(bd>Math.PI)bd-=Math.PI*2;while(bd<-Math.PI)bd+=Math.PI*2;
    e.boat.rotation.y+=bd*0.15;e.boat.rotation.z=-bd*0.2;

    // Sails
    const sl=e.boat.getObjectByName('sail');
    if(sl){sl.scale.y+=([0.05,0.5,1][p.sails||1]-sl.scale.y)*0.1;}
    const s2=e.boat.getObjectByName('sail2');
    if(s2){s2.scale.y+=([0.05,0.4,0.9][p.sails||1]-s2.scale.y)*0.1;}

    // Cannon barrel aim
    if(isMe&&p.onBoat){
      const brl=e.boat.getObjectByName('cannonBarrel');
      if(brl){const d=Math.sqrt((mWorld.x-e.boat.position.x)**2+(mWorld.z-e.boat.position.z)**2);brl.rotation.x=Math.PI/2-Math.min(0.5,Math.max(-0.1,d*0.003));}
    }

    // Character
    if(p.onBoat){
      e.char.position.copy(e.boat.position);
      const sd=shipDefs[p.shipType]||{};
      if(sd.cannons==='front'){e.char.position.x+=Math.sin(e.boat.rotation.y)*2;e.char.position.z+=Math.cos(e.boat.rotation.y)*2;}
      else{e.char.position.x-=Math.sin(e.boat.rotation.y)*5;e.char.position.z-=Math.cos(e.boat.rotation.y)*5;}
      e.char.position.y=e.boat.position.y+1.5;
      if(isMe){const dx=mWorld.x-e.char.position.x,dz=mWorld.z-e.char.position.z;e.char.rotation.y=Math.atan2(dx,dz);}
      else e.char.rotation.y=e.boat.rotation.y;
    }else{
      e.char.position.x+=(p.cx-e.char.position.x)*0.2;e.char.position.z+=(p.cz-e.char.position.z)*0.2;e.char.position.y+=(p.cy-e.char.position.y)*0.2;
      let cd=p.cRot-e.char.rotation.y;while(cd>Math.PI)cd-=Math.PI*2;while(cd<-Math.PI)cd+=Math.PI*2;e.char.rotation.y+=cd*0.2;
      const sw=Math.sin(t*8)*0.4;
      ['legL','legR','armL','armR'].forEach(n=>{const m=e.char.getObjectByName(n);if(m)m.rotation.x=n.includes('L')?sw:-sw;});
    }

    // Name
    if(e.lName!==p.name){if(e.nTag.parent)e.nTag.parent.remove(e.nTag);e.nTag=mkName(p.name,isMe);e.lName=p.name;}
    const att=p.onBoat?'boat':'char';
    if(e.nOn!==att){
      if(e.nTag.parent)e.nTag.parent.remove(e.nTag);
      (p.onBoat?e.boat:e.char).add(e.nTag);
      e.nTag.position.y=p.onBoat?(p.shipType==='warship'?22:9):5.5;
      e.nOn=att;
    }
  }
  for(const id in ents)if(!active.has(id))rmEnt(id);

  // Aim marker + landing
  const me=gs.players[myId];
  if(me&&me.onBoat){
    aimMarker.visible=true;aimMarker.position.x=mWorld.x;aimMarker.position.z=mWorld.z;
    const sd=shipDefs[me.shipType]||{};
    if(sd.cannons==='side'){
      for(let i=0;i<3;i++){landingDots[i].visible=true;const sp=(i-1)*7;landingDots[i].position.x=mWorld.x+Math.sin(me.bRot)*sp;landingDots[i].position.z=mWorld.z+Math.cos(me.bRot)*sp;}
    }else landingDots.forEach(l=>l.visible=false);
  }else{aimMarker.visible=false;landingDots.forEach(l=>l.visible=false);}

  // Cannonballs
  const cbs=gs.cannonballs||[];
  for(let i=0;i<cbs.length;i++){const m=getCB(i);m.visible=true;m.position.set(cbs[i].x,cbs[i].y,cbs[i].z);}
  for(let i=cbs.length;i<cbPool.length;i++)cbPool[i].visible=false;

  // Camera
  if(me&&ents[myId]){
    const e=ents[myId];let tgt,rot,cd,ch;
    if(me.onBoat){tgt=e.boat.position;rot=e.boat.rotation.y;cd=45;ch=25;}
    else{tgt=e.char.position;rot=e.char.rotation.y;cd=22;ch=14;}
    const tx=tgt.x-Math.sin(rot)*cd,tz=tgt.z-Math.cos(rot)*cd;
    camera.position.x+=(tx-camera.position.x)*0.06;camera.position.z+=(tz-camera.position.z)*0.06;
    camera.position.y+=(tgt.y+ch-camera.position.y)*0.06;
    camera.lookAt(tgt.x,tgt.y+3,tgt.z);
  }else if(spawnData){
    // Fallback: look at spawn point while waiting for state
    camera.lookAt(spawnData.x,0,spawnData.z);
  }

  updateHUD();
  drawMinimap();
  renderer.render(scene,camera);
}

/* ── HUD ── */
function updateHUD(){
  const me=gs.players[myId];if(!me)return;
  myGold=me.gold;myShipType=me.shipType;myOwned=me.ownedShips||myOwned;
  document.getElementById('gold-display').textContent=myGold+' Gold';
  const pct=Math.max(0,me.hp)/(me.maxHp||100);
  const hb=document.getElementById('health-bar');
  hb.style.width=(pct*100)+'%';
  hb.style.background=pct>0.6?'#2ecc71':pct>0.3?'#f1c40f':'#e74c3c';
  document.getElementById('health-text').textContent=Math.max(0,me.hp)+' / '+(me.maxHp||100);

  const si=document.getElementById('sails-ind');
  si.style.display=me.onBoat?'block':'none';
  si.textContent=['Stopped','Half Sail','Full Sail'][me.sails||1];

  const sl=document.getElementById('state-label');
  sl.textContent=me.onBoat?(shipDefs[me.shipType]?.name||'Boat'):me.swimming?'Swimming!':'On Land [B=Shop]';

  const ap=document.getElementById('action-prompt');
  if(me.onBoat){let n=false;for(const i of islandsData){const dx=me.bx-i.x,dz=me.bz-i.z;if(Math.sqrt(dx*dx+dz*dz)<i.radius+14){n=true;break;}}ap.style.display=n?'block':'none';ap.textContent='Press E to disembark';}
  else if(!me.swimming){const dx=me.cx-me.bx,dz=me.cz-me.bz;const nb=dx*dx+dz*dz<324;ap.style.display=nb?'block':'none';ap.textContent='Press E to board';}
  else ap.style.display='none';

  document.getElementById('player-count').textContent=Object.keys(gs.players).length+' online';
  const sorted=Object.entries(gs.players).sort((a,b)=>b[1].score-a[1].score).slice(0,8);
  document.getElementById('score-list').innerHTML=sorted.map(([id,p])=>`<div class="sr${id===myId?' me':''}"><span>${p.name}</span><span>${p.score} · ${p.gold}g</span></div>`).join('');
}

/* ── MINIMAP ── */
function drawMinimap(){
  const c=mmCtx,w=200,h=200,s=w/mapSize;
  c.clearRect(0,0,w,h);c.fillStyle='rgba(8,35,60,.9)';c.fillRect(0,0,w,h);
  c.strokeStyle='rgba(255,255,255,.05)';c.lineWidth=1;
  for(let i=1;i<4;i++){const p=i*50;c.beginPath();c.moveTo(p,0);c.lineTo(p,h);c.stroke();c.beginPath();c.moveTo(0,p);c.lineTo(w,p);c.stroke();}
  c.fillStyle='#4a8a3a';
  for(const i of islandsData){c.beginPath();c.arc(w/2+i.x*s,h/2+i.z*s,Math.max(5,i.radius*s),0,Math.PI*2);c.fill();}
  c.fillStyle='rgba(255,255,255,.35)';c.font='7px sans-serif';c.textAlign='center';
  for(const i of islandsData)c.fillText(i.name||'',w/2+i.x*s,h/2+i.z*s+i.radius*s+9);
  for(const id in gs.players){
    const p=gs.players[id],isMe=id===myId;
    c.fillStyle=isMe?'#2ecc71':'#e74c3c';
    c.beginPath();c.arc(w/2+p.bx*s,h/2+p.bz*s,isMe?4:3,0,Math.PI*2);c.fill();
    if(isMe){const r=p.onBoat?p.bRot:p.cRot;c.strokeStyle='#2ecc71';c.lineWidth=2;c.beginPath();c.moveTo(w/2+p.bx*s,h/2+p.bz*s);c.lineTo(w/2+p.bx*s+Math.sin(r)*8,h/2+p.bz*s+Math.cos(r)*8);c.stroke();
      if(!p.onBoat){c.fillStyle='#f1c40f';c.beginPath();c.arc(w/2+p.cx*s,h/2+p.cz*s,3,0,Math.PI*2);c.fill();}
    }
  }
  c.strokeStyle='rgba(255,255,255,.12)';c.lineWidth=1;c.strokeRect(0,0,w,h);
}
