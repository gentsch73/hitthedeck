<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krew3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif;user-select:none}
canvas{display:block}

/* HUD */
#hud-top-left{position:fixed;top:10px;left:10px;z-index:10}
#info-panel{background:rgba(0,0,0,.55);color:#fff;padding:8px 12px;border-radius:8px;font-size:10px;border:1px solid rgba(255,255,255,.1);line-height:1.7;display:none}
#info-panel kbd{background:rgba(255,255,255,.12);padding:1px 4px;border-radius:3px;font-size:9px}

#gold-display{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#f1c40f;font-size:14px;font-weight:bold;padding:5px 18px;border-radius:8px;z-index:10;display:none;border:1px solid rgba(241,196,15,.3)}

#health-bar-wrap{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);width:260px;height:20px;background:rgba(0,0,0,.55);border:2px solid rgba(255,255,255,.2);border-radius:10px;overflow:hidden;z-index:10;display:none}
#health-bar{height:100%;width:100%;background:linear-gradient(90deg,#e74c3c,#f1c40f 50%,#2ecc71);transition:width .3s;border-radius:10px}
#health-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-weight:bold;font-size:11px;text-shadow:1px 1px 2px #000}

#sails-indicator{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);color:#fff;font-size:11px;z-index:10;display:none;background:rgba(0,0,0,.4);padding:2px 10px;border-radius:6px}

#action-prompt{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);color:#f1c40f;font-size:14px;font-weight:bold;z-index:10;display:none;background:rgba(0,0,0,.6);padding:6px 16px;border-radius:8px}

#reload-bar-wrap{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);width:120px;height:4px;background:rgba(0,0,0,.4);border-radius:2px;z-index:10;display:none;overflow:hidden}
#reload-bar{height:100%;width:0%;background:#e74c3c;border-radius:2px;transition:width .1s}

#minimap{position:fixed;bottom:15px;right:15px;width:200px;height:200px;background:rgba(10,30,60,.85);border:2px solid rgba(255,255,255,.2);border-radius:8px;z-index:10;display:none;cursor:crosshair}

#score-board{position:fixed;top:10px;right:10px;background:rgba(0,0,0,.5);color:#fff;padding:8px 14px;border-radius:8px;font-size:11px;z-index:10;display:none;border:1px solid rgba(255,255,255,.1);max-height:200px;overflow-y:auto}
#score-board h3{margin-bottom:4px;color:#f1c40f;font-size:12px}
.sr{display:flex;justify-content:space-between;gap:14px;padding:1px 0}.sr.me{color:#2ecc71;font-weight:bold}

#state-label{position:fixed;top:75px;left:10px;color:rgba(255,255,255,.5);font-size:10px;z-index:10;display:none;background:rgba(0,0,0,.3);padding:2px 6px;border-radius:4px}
#player-count{position:fixed;bottom:4px;left:10px;color:rgba(255,255,255,.35);font-size:9px;z-index:10;display:none}

/* Connection */
#conn-status{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#f1c40f;padding:12px 24px;border-radius:8px;font-size:14px;z-index:200;display:none}

/* Death */
#death-screen{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;z-index:100;flex-direction:column;color:#fff}
#death-screen h1{font-size:40px;color:#e74c3c;margin-bottom:6px}

/* Name input */
#name-wrap{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;background:rgba(0,0,0,.88);padding:24px 32px;border-radius:12px;text-align:center;color:#fff;border:2px solid rgba(241,196,15,.4)}
#name-wrap h2{color:#f1c40f;margin-bottom:10px;font-size:24px}
#name-input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 12px;border-radius:6px;font-size:14px;outline:none;width:180px;text-align:center}
#name-input::placeholder{color:rgba(255,255,255,.3)}
#name-btn{display:block;margin:8px auto 0;padding:8px 24px;background:#f1c40f;color:#000;border:none;border-radius:6px;font-size:13px;font-weight:bold;cursor:pointer}

/* Market */
#market{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:150;display:none;justify-content:center;align-items:center}
#market-inner{background:rgba(20,20,30,.95);border:2px solid rgba(241,196,15,.4);border-radius:14px;padding:24px 30px;color:#fff;min-width:500px;max-width:600px}
#market-inner h2{color:#f1c40f;margin-bottom:4px;font-size:20px}
#market-gold{color:#f1c40f;margin-bottom:14px;font-size:13px}
.ship-card{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px 16px;margin-bottom:8px;transition:border-color .2s}
.ship-card:hover{border-color:rgba(241,196,15,.4)}
.ship-info h3{font-size:14px;margin-bottom:2px}
.ship-info p{font-size:11px;opacity:.6;line-height:1.4}
.ship-btn{padding:6px 16px;border:none;border-radius:6px;font-size:12px;font-weight:bold;cursor:pointer;min-width:80px}
.ship-btn.buy{background:#f1c40f;color:#000}
.ship-btn.owned{background:#2ecc71;color:#000}
.ship-btn.equip{background:#3498db;color:#fff}
.ship-btn.equipped{background:#555;color:#aaa;cursor:default}
#market-close{display:block;margin:12px auto 0;padding:6px 20px;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:6px;cursor:pointer;font-size:12px}
#shop-msg{color:#2ecc71;font-size:12px;text-align:center;margin-top:6px;min-height:16px}

/* Crosshair */
#crosshair{position:fixed;pointer-events:none;z-index:5;display:none}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.7)}
#crosshair::before{width:16px;height:2px;top:7px;left:0}
#crosshair::after{width:2px;height:16px;top:0;left:7px}

/* Teleport hint */
#tp-hint{position:fixed;bottom:220px;right:15px;color:rgba(255,255,255,.4);font-size:9px;z-index:10;display:none;text-align:center;width:200px}
</style>
</head>
<body>

<div id="name-wrap">
  <h2>KREW 3D</h2>
  <p style="margin-bottom:10px;opacity:.5;font-size:11px">Enter your pirate name</p>
  <input id="name-input" type="text" placeholder="Captain..." maxlength="16" autofocus>
  <button id="name-btn">SET SAIL!</button>
</div>

<div id="conn-status"></div>
<div id="crosshair"></div>

<div id="hud-top-left">
  <div id="info-panel">
    <strong style="color:#f1c40f">Controls</strong><br>
    <kbd>W</kbd><kbd>S</kbd><kbd>A</kbd><kbd>D</kbd> Move/Turn<br>
    <kbd>Mouse</kbd> Aim · <kbd>Click</kbd> Fire<br>
    <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> Sails<br>
    <kbd>E</kbd> Board/Leave · <kbd>Space</kbd> Jump<br>
    <kbd>B</kbd> Shop (on land)
  </div>
</div>

<div id="gold-display"></div>
<div id="sails-indicator"></div>
<div id="health-bar-wrap"><div id="health-bar"></div><div id="health-text"></div></div>
<div id="reload-bar-wrap"><div id="reload-bar"></div></div>
<div id="action-prompt"></div>
<canvas id="minimap"></canvas>
<div id="tp-hint">Click minimap to teleport</div>
<div id="score-board"><h3>Scoreboard</h3><div id="score-list"></div></div>
<div id="state-label"></div>
<div id="player-count"></div>

<div id="death-screen"><h1>SUNK!</h1><p id="death-msg"></p><p style="margin-top:10px;opacity:.4;font-size:12px">Respawning...</p></div>

<!-- Market -->
<div id="market">
  <div id="market-inner">
    <h2>Ship Market</h2>
    <div id="market-gold"></div>
    <div id="ship-list"></div>
    <div id="shop-msg"></div>
    <button id="market-close">Close [B]</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
// ── GLOBALS ──
let socket, scene, camera, renderer, clock;
let myId=null, mapSize=1600, islandsData=[], obstaclesData=[], shipDefs={};
let waterMesh, aimMarker, landingIndicators=[];
let entities={}, cbMeshes=[];
let gameState={players:{},cannonballs:[]};
let keys={}, mouseX=0, mouseY=0, mouseWorld={x:0,z:0};
let started=false, playerName='Pirate', marketOpen=false;
let myGold=5000, myOwned=['rowboat'], myShipType='rowboat';
let lastFireTime=0;

const raycaster=new THREE.Raycaster();
const mouse2=new THREE.Vector2();
const waterPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);

const mmCvs=document.getElementById('minimap');
const mmCtx=mmCvs.getContext('2d');
mmCvs.width=200;mmCvs.height=200;

// ── START ──
document.getElementById('name-btn').onclick=startGame;
document.getElementById('name-input').onkeydown=e=>{if(e.key==='Enter')startGame()};

function startGame(){
  playerName=document.getElementById('name-input').value.trim()||'Pirate';
  document.getElementById('name-wrap').style.display='none';
  ['info-panel','health-bar-wrap','score-board','sails-indicator','minimap','player-count','state-label','gold-display','crosshair','reload-bar-wrap','tp-hint'].forEach(id=>document.getElementById(id).style.display='block');
  started=true;
  initThree();
  connectSocket();
  animate();
}

// ── THREE.JS ──
function initThree(){
  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x6baed6,0.001);

  camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,1,3000);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setClearColor(0x7ec8e3);
  document.body.appendChild(renderer.domElement);
  clock=new THREE.Clock();

  scene.add(new THREE.AmbientLight(0xffffff,0.45));
  const sun=new THREE.DirectionalLight(0xfff0d0,1.1);
  sun.position.set(400,500,200);scene.add(sun);
  scene.add(new THREE.HemisphereLight(0x87ceeb,0x3a7a5a,0.3));

  // Water
  waterMesh=new THREE.Mesh(
    new THREE.PlaneGeometry(4000,4000,80,80),
    new THREE.MeshPhongMaterial({color:0x0a4a6e,transparent:true,opacity:0.9,shininess:60,specular:0x1a5577})
  );
  waterMesh.rotation.x=-Math.PI/2;
  waterMesh.name='water';
  scene.add(waterMesh);

  // Aim marker (circle on water)
  const aimGeo=new THREE.RingGeometry(1.5,2,24);
  aimMarker=new THREE.Mesh(aimGeo,new THREE.MeshBasicMaterial({color:0xff4444,transparent:true,opacity:0.6,side:THREE.DoubleSide}));
  aimMarker.rotation.x=-Math.PI/2;
  aimMarker.position.y=0.5;
  aimMarker.visible=false;
  scene.add(aimMarker);

  // Landing indicators (for warship)
  for(let i=0;i<3;i++){
    const li=new THREE.Mesh(
      new THREE.RingGeometry(1,1.8,16),
      new THREE.MeshBasicMaterial({color:0xff6600,transparent:true,opacity:0.5,side:THREE.DoubleSide})
    );
    li.rotation.x=-Math.PI/2;li.position.y=0.3;li.visible=false;
    scene.add(li);
    landingIndicators.push(li);
  }

  window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });

  // Input
  window.addEventListener('keydown',e=>{
    if(!started)return;
    if(marketOpen&&e.code==='KeyB'){toggleMarket();return;}
    if(marketOpen)return;
    keys[e.code]=true;
    if(e.code==='Digit1')socket?.emit('setSails',0);
    if(e.code==='Digit2')socket?.emit('setSails',1);
    if(e.code==='Digit3')socket?.emit('setSails',2);
    if(e.code==='KeyB')toggleMarket();
    if(e.code==='Space')e.preventDefault();
  });
  window.addEventListener('keyup',e=>{keys[e.code]=false});
  window.addEventListener('blur',()=>{keys={}});

  // Mouse
  window.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY});
  window.addEventListener('mousedown',e=>{
    if(marketOpen||!started)return;
    if(e.button===0)socket?.emit('fire');
  });

  // Minimap teleport
  mmCvs.addEventListener('click',e=>{
    const rect=mmCvs.getBoundingClientRect();
    const mx=(e.clientX-rect.left)/200;
    const mz=(e.clientY-rect.top)/200;
    const wx=(mx-0.5)*mapSize;
    const wz=(mz-0.5)*mapSize;
    socket?.emit('teleport',{x:wx,z:wz});
  });

  // Market close
  document.getElementById('market-close').onclick=()=>toggleMarket();
}

function toggleMarket(){
  const me=gameState.players[myId];
  if(!me)return;
  // Only open when on land
  if(!marketOpen&&me.onBoat)return;
  marketOpen=!marketOpen;
  document.getElementById('market').style.display=marketOpen?'flex':'none';
  if(marketOpen)updateMarketUI();
}

// ── SHIP MODELS ──
function createRowboat(){
  const g=new THREE.Group();
  // Hull
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(3,1.2,8),new THREE.MeshPhongMaterial({color:0x8B6914})),{position:new THREE.Vector3(0,0.7,0)}));
  // Sides
  for(const s of[-1,1])g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.25,1,8.2),new THREE.MeshPhongMaterial({color:0x6B4E12})),{position:new THREE.Vector3(s*1.6,1.4,0)}));
  // Bow
  g.add(Object.assign(new THREE.Mesh(new THREE.ConeGeometry(1.7,2.5,4),new THREE.MeshPhongMaterial({color:0x8B6914})),{position:new THREE.Vector3(0,0.8,5),rotation:new THREE.Euler(Math.PI/2,0,0)}));
  // Stern
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(3.2,1.6,0.3),new THREE.MeshPhongMaterial({color:0x6B4E12})),{position:new THREE.Vector3(0,1.2,-4.2)}));
  // Mast
  g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.13,6,6),new THREE.MeshPhongMaterial({color:0x543210})),{position:new THREE.Vector3(0,4.2,-1)}));
  // Sail
  const sail=new THREE.Mesh(new THREE.PlaneGeometry(2.8,3.8),new THREE.MeshPhongMaterial({color:0xf0e8d0,side:THREE.DoubleSide,transparent:true,opacity:0.85}));
  sail.position.set(0,5.5,-0.8);sail.name='sail';g.add(sail);
  // Cannon
  g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.4,0.4,8),new THREE.MeshPhongMaterial({color:0x333})),{position:new THREE.Vector3(0,1.5,3)}));
  const barrel=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.2,2,8),new THREE.MeshPhongMaterial({color:0x1a1a1a}));
  barrel.rotation.x=Math.PI/2;barrel.position.set(0,1.7,4.2);barrel.name='cannonBarrel';g.add(barrel);
  return g;
}

function createWarship(){
  const g=new THREE.Group();
  // Hull
  const hullShape=new THREE.Shape();
  hullShape.moveTo(0,-10);hullShape.quadraticCurveTo(5,-8,5.5,0);hullShape.quadraticCurveTo(5.5,8,3,10);
  hullShape.lineTo(-3,10);hullShape.quadraticCurveTo(-5.5,8,-5.5,0);hullShape.quadraticCurveTo(-5,-8,0,-10);
  const hull=new THREE.Mesh(new THREE.ExtrudeGeometry(hullShape,{depth:4,bevelEnabled:true,bevelSize:0.5,bevelThickness:0.3}),new THREE.MeshPhongMaterial({color:0x5a3015}));
  hull.rotation.x=-Math.PI/2;hull.position.y=1;g.add(hull);
  // Deck
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(9,0.3,18),new THREE.MeshPhongMaterial({color:0xC4A060})),{position:new THREE.Vector3(0,3.8,0)}));
  // Raised stern
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(8,2,5),new THREE.MeshPhongMaterial({color:0x6B3E1A})),{position:new THREE.Vector3(0,4.5,-7)}));
  // Raised bow
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(6,1.5,3),new THREE.MeshPhongMaterial({color:0x6B3E1A})),{position:new THREE.Vector3(0,4.2,8)}));
  // 2 Masts
  for(const z of[-2,4]){
    g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.25,14,8),new THREE.MeshPhongMaterial({color:0x543210})),{position:new THREE.Vector3(0,11,z)}));
    const s=new THREE.Mesh(new THREE.PlaneGeometry(6,8),new THREE.MeshPhongMaterial({color:0xe8dfc8,side:THREE.DoubleSide,transparent:true,opacity:0.85}));
    s.position.set(0,13,z+0.3);s.name=z===-2?'sail':'sail2';g.add(s);
  }
  // Side cannons (3 per side) - visual
  for(const side of[-1,1]){
    for(let i=-1;i<=1;i++){
      const c=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.3,1.8,6),new THREE.MeshPhongMaterial({color:0x222}));
      c.rotation.z=side*Math.PI/2;c.position.set(side*5,3.8,i*4);g.add(c);
    }
  }
  // Flag
  g.add(Object.assign(new THREE.Mesh(new THREE.PlaneGeometry(2,1.2),new THREE.MeshPhongMaterial({color:0x111,side:THREE.DoubleSide})),{position:new THREE.Vector3(0,18.5,-2)}));
  return g;
}

function createTradeship(){
  const g=new THREE.Group();
  // Hull - wider
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(6,2.5,14),new THREE.MeshPhongMaterial({color:0x6B4E12})),{position:new THREE.Vector3(0,1.5,0)}));
  // Sides
  for(const s of[-1,1])g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.3,2,14.5),new THREE.MeshPhongMaterial({color:0x543210})),{position:new THREE.Vector3(s*3.15,2.8,0)}));
  // Bow
  g.add(Object.assign(new THREE.Mesh(new THREE.ConeGeometry(3.2,4,4),new THREE.MeshPhongMaterial({color:0x6B4E12})),{position:new THREE.Vector3(0,1.5,9),rotation:new THREE.Euler(Math.PI/2,0,0)}));
  // Deck
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(5.5,0.2,13),new THREE.MeshPhongMaterial({color:0xC4A060})),{position:new THREE.Vector3(0,3,0)}));
  // Cabin
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(4,2.5,4),new THREE.MeshPhongMaterial({color:0x7a5020})),{position:new THREE.Vector3(0,4.5,-4.5)}));
  // Mast (tall, single)
  g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.22,12,8),new THREE.MeshPhongMaterial({color:0x543210})),{position:new THREE.Vector3(0,9.5,1)}));
  // Big triangular sail (2 planes)
  const s1=new THREE.Mesh(new THREE.PlaneGeometry(7,9),new THREE.MeshPhongMaterial({color:0xe8dfc8,side:THREE.DoubleSide,transparent:true,opacity:0.85}));
  s1.position.set(0,11,2);s1.rotation.y=0.2;s1.name='sail';g.add(s1);
  const s2=new THREE.Mesh(new THREE.PlaneGeometry(5,7),new THREE.MeshPhongMaterial({color:0xddd8c0,side:THREE.DoubleSide,transparent:true,opacity:0.8}));
  s2.position.set(0,10,5);s2.rotation.y=-0.15;s2.name='sail2';g.add(s2);
  // Bowsprit
  const bs=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.1,6,6),new THREE.MeshPhongMaterial({color:0x543210}));
  bs.rotation.x=Math.PI/2.5;bs.position.set(0,4,10);g.add(bs);
  // Cannon at bow
  g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.35,0.4,8),new THREE.MeshPhongMaterial({color:0x333})),{position:new THREE.Vector3(0,3.3,5.5)}));
  const barrel=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.2,2.2,8),new THREE.MeshPhongMaterial({color:0x1a1a1a}));
  barrel.rotation.x=Math.PI/2;barrel.position.set(0,3.5,6.8);barrel.name='cannonBarrel';g.add(barrel);
  return g;
}

function createCharacter(isMe){
  const g=new THREE.Group();
  const col=isMe?0x2e86c1:0xc0392b;
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.9,1.5,0.6),new THREE.MeshPhongMaterial({color:col})),{position:new THREE.Vector3(0,2.3,0)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.SphereGeometry(0.38,8,8),new THREE.MeshPhongMaterial({color:0xf0c090})),{position:new THREE.Vector3(0,3.4,0)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.45,0.45,8),new THREE.MeshPhongMaterial({color:0x1a1a1a})),{position:new THREE.Vector3(0,3.9,0)}));
  for(const s of[-0.22,0.22]){
    const leg=new THREE.Mesh(new THREE.BoxGeometry(0.3,1,0.35),new THREE.MeshPhongMaterial({color:0x4a3520}));
    leg.position.set(s,0.9,0);leg.name=s<0?'legL':'legR';g.add(leg);
  }
  for(const s of[-0.6,0.6]){
    const arm=new THREE.Mesh(new THREE.BoxGeometry(0.25,1,0.25),new THREE.MeshPhongMaterial({color:col}));
    arm.position.set(s,2.3,0);arm.name=s<0?'armL':'armR';g.add(arm);
  }
  return g;
}

function createNameSprite(name,isMe){
  const c=document.createElement('canvas');c.width=256;c.height=40;
  const x=c.getContext('2d');
  x.fillStyle=isMe?'rgba(46,134,193,.65)':'rgba(0,0,0,.5)';
  x.beginPath();x.roundRect(4,2,248,36,5);x.fill();
  x.fillStyle='#fff';x.font='bold 18px sans-serif';x.textAlign='center';
  x.fillText(name,128,28);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true}));
  s.scale.set(10,2.5,1);return s;
}

function createIsland(d){
  const g=new THREE.Group();
  g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(d.radius*0.92,d.radius,3.5,28),new THREE.MeshPhongMaterial({color:0x4a8a3a,flatShading:true})),{position:new THREE.Vector3(0,1.8,0)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(d.radius,d.radius+10,2,28),new THREE.MeshPhongMaterial({color:0xf0d9a0})),{position:new THREE.Vector3(0,0.6,0)}));
  for(let i=0;i<3;i++){
    const r=d.radius*(0.15+Math.random()*0.25);
    const h=new THREE.Mesh(new THREE.SphereGeometry(r,10,8),new THREE.MeshPhongMaterial({color:0x3d7a30,flatShading:true}));
    const a=Math.random()*Math.PI*2,dist=Math.random()*d.radius*0.4;
    h.position.set(Math.cos(a)*dist,r*0.35+2.5,Math.sin(a)*dist);h.scale.y=0.45;g.add(h);
  }
  const nt=4+Math.floor(d.radius/12);
  for(let i=0;i<nt;i++){
    const a=Math.random()*Math.PI*2,dist=5+Math.random()*(d.radius-15);
    const p=createPalmTree();p.position.set(Math.cos(a)*dist,2.8,Math.sin(a)*dist);
    p.scale.setScalar(0.6+Math.random()*0.4);g.add(p);
  }
  g.position.set(d.x,0,d.z);scene.add(g);
}

function createPalmTree(){
  const g=new THREE.Group();
  g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.35,6,6),new THREE.MeshPhongMaterial({color:0x8B6914})),{position:new THREE.Vector3(0,3,0),rotation:new THREE.Euler(0,0,(Math.random()-0.5)*0.2)}));
  for(let i=0;i<5;i++){
    const a=(i/5)*Math.PI*2;
    const l=new THREE.Mesh(new THREE.ConeGeometry(2,3,4),new THREE.MeshPhongMaterial({color:0x228B22,flatShading:true}));
    l.position.set(Math.cos(a)*1,6.5,Math.sin(a)*1);
    l.rotation.set(Math.sin(a)*.6,0,Math.cos(a)*.6);g.add(l);
  }
  return g;
}

// Obstacle meshes (rocks/barrels on islands)
function createObstacles(){
  for(const ob of obstaclesData){
    const m=new THREE.Mesh(
      new THREE.SphereGeometry(ob.radius,6,6),
      new THREE.MeshPhongMaterial({color:0x666655,flatShading:true})
    );
    m.position.set(ob.x,3+ob.radius*0.5,ob.z);
    m.scale.y=0.6;
    scene.add(m);
  }
}

// ── ENTITY MANAGEMENT ──
function getEntity(id){
  if(!entities[id]){
    const isMe=id===myId;
    const char=createCharacter(isMe);
    const nt=createNameSprite('...',isMe);nt.position.y=5.5;
    scene.add(char);
    entities[id]={boat:null,boatType:null,char,nameTag:nt,lastName:'',nameOn:null};
  }
  return entities[id];
}

function ensureBoat(e,type){
  if(e.boatType===type)return;
  if(e.boat)scene.remove(e.boat);
  if(type==='rowboat')e.boat=createRowboat();
  else if(type==='warship')e.boat=createWarship();
  else if(type==='tradeship')e.boat=createTradeship();
  else e.boat=createRowboat();
  scene.add(e.boat);
  e.boatType=type;
}

function removeEntity(id){
  const e=entities[id];if(!e)return;
  if(e.boat)scene.remove(e.boat);
  scene.remove(e.char);
  if(e.nameTag.parent)e.nameTag.parent.remove(e.nameTag);
  delete entities[id];
}

// ── SOCKET ──
function connectSocket(){
  const st=document.getElementById('conn-status');
  socket=io({reconnection:true,reconnectionDelay:1000,transports:['websocket','polling']});

  socket.on('connect',()=>{st.style.display='none'});
  socket.on('disconnect',()=>{st.textContent='Reconnecting...';st.style.display='block';keys={}});

  socket.on('init',data=>{
    const old=myId;myId=data.id;mapSize=data.mapSize;
    shipDefs=data.ships||{};
    if(!islandsData.length){
      islandsData=data.islands;obstaclesData=data.obstacles||[];
      for(const i of data.islands)createIsland(i);
      createObstacles();
    }
    if(old&&old!==myId)removeEntity(old);
    socket.emit('setName',playerName);
  });

  socket.on('playerLeft',removeEntity);
  socket.on('state',s=>{gameState=s});
  socket.on('sunk',d=>{
    document.getElementById('death-msg').textContent=`Sunk by ${d.by}!`;
    document.getElementById('death-screen').style.display='flex';
    setTimeout(()=>document.getElementById('death-screen').style.display='none',2500);
  });
  socket.on('shopMsg',msg=>{document.getElementById('shop-msg').textContent=msg});
  socket.on('updatePlayer',d=>{
    if(d.gold!==undefined)myGold=d.gold;
    if(d.ownedShips)myOwned=d.ownedShips;
    if(d.shipType)myShipType=d.shipType;
    if(marketOpen)updateMarketUI();
  });

  setInterval(()=>{if(socket?.connected)socket.emit('heartbeat')},5000);
}

// ── MARKET UI ──
function updateMarketUI(){
  const me=gameState.players[myId];
  if(me){myGold=me.gold;myShipType=me.shipType;}
  document.getElementById('market-gold').textContent=`Gold: ${myGold}`;
  const list=document.getElementById('ship-list');
  list.innerHTML='';
  for(const[type,def]of Object.entries(shipDefs)){
    const owned=myOwned.includes(type);
    const equipped=myShipType===type;
    const canBuy=myGold>=def.price;
    let btnClass,btnText;
    if(equipped){btnClass='equipped';btnText='Equipped';}
    else if(owned){btnClass='equip';btnText='Equip';}
    else if(canBuy){btnClass='buy';btnText=`Buy ${def.price}g`;}
    else{btnClass='equipped';btnText=`${def.price}g`;}

    const card=document.createElement('div');card.className='ship-card';
    const cannonInfo=def.cannons==='side'?`${def.cannonCount} side cannons per side`:`Front cannon`;
    card.innerHTML=`
      <div class="ship-info"><h3>${def.name}</h3><p>HP: ${def.hp} · Speed: ${Math.round(def.speed*100)} · ${cannonInfo}</p></div>
      <button class="ship-btn ${btnClass}" data-type="${type}">${btnText}</button>`;
    list.appendChild(card);
    card.querySelector('button').onclick=()=>{
      if(equipped)return;
      if(owned)socket.emit('switchShip',type);
      else socket.emit('buyShip',type);
    };
  }
}

// ── MOUSE AIM ──
function updateAim(){
  mouse2.x=(mouseX/innerWidth)*2-1;
  mouse2.y=-(mouseY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse2,camera);
  const hit=new THREE.Vector3();
  if(raycaster.ray.intersectPlane(waterPlane,hit)){
    mouseWorld.x=hit.x;mouseWorld.z=hit.z;
    socket?.emit('aim',{x:hit.x,z:hit.z});
  }
}

// ── CB POOL ──
const cbG=new THREE.SphereGeometry(0.4,6,6);
const cbM=new THREE.MeshPhongMaterial({color:0x1a1a1a});
function getCB(i){
  while(cbMeshes.length<=i){const m=new THREE.Mesh(cbG,cbM);m.visible=false;scene.add(m);cbMeshes.push(m);}
  return cbMeshes[i];
}

// ── ANIMATE ──
function animate(){
  requestAnimationFrame(animate);
  const time=clock.getElapsedTime();

  if(socket?.connected&&myId&&!marketOpen){
    socket.volatile.emit('input',{
      forward:!!(keys['KeyW']||keys['ArrowUp']),
      backward:!!(keys['KeyS']||keys['ArrowDown']),
      left:!!(keys['KeyA']||keys['ArrowLeft']),
      right:!!(keys['KeyD']||keys['ArrowRight']),
      action:!!keys['KeyE'],
      jump:!!keys['Space'],
    });
  }

  updateAim();

  // Water
  const wp=waterMesh.geometry.attributes.position;
  for(let i=0;i<wp.count;i++){
    const x=wp.getX(i),y=wp.getY(i);
    wp.setZ(i,Math.sin(x*0.02+time*1.2)*0.6+Math.sin(y*0.025+time)*0.5+Math.sin((x+y)*0.012+time*0.6)*0.8);
  }
  wp.needsUpdate=true;waterMesh.geometry.computeVertexNormals();

  // Update entities
  const active=new Set();
  for(const id in gameState.players){
    active.add(id);
    const p=gameState.players[id];
    const e=getEntity(id);
    const isMe=id===myId;

    ensureBoat(e,p.shipType);

    // Boat
    e.boat.position.x+=(p.bx-e.boat.position.x)*0.15;
    e.boat.position.z+=(p.bz-e.boat.position.z)*0.15;
    e.boat.position.y=Math.sin(time*1.8+p.bx*0.07)*0.35+0.3;
    let bd=p.bRot-e.boat.rotation.y;
    while(bd>Math.PI)bd-=Math.PI*2;while(bd<-Math.PI)bd+=Math.PI*2;
    e.boat.rotation.y+=bd*0.15;
    e.boat.rotation.z=-bd*0.2;
    e.boat.rotation.x=Math.sin(time*1.3+p.bx*0.1)*0.025;

    // Sails
    const sail=e.boat.getObjectByName('sail');
    if(sail){const ts=[0.05,0.5,1][p.sails||1];sail.scale.y+=(ts-sail.scale.y)*0.1;}
    const sail2=e.boat.getObjectByName('sail2');
    if(sail2){const ts=[0.05,0.4,0.9][p.sails||1];sail2.scale.y+=(ts-sail2.scale.y)*0.1;}

    // Cannon barrel aim (for front cannon ships)
    if(isMe&&p.onBoat){
      const barrel=e.boat.getObjectByName('cannonBarrel');
      if(barrel){
        const dx=mouseWorld.x-e.boat.position.x,dz=mouseWorld.z-e.boat.position.z;
        const dist=Math.sqrt(dx*dx+dz*dz);
        const elev=Math.min(0.5,Math.max(-0.1,dist*0.003));
        barrel.rotation.x=Math.PI/2-elev;
      }
    }

    // Character
    if(p.onBoat){
      e.char.position.copy(e.boat.position);
      const ship=shipDefs[p.shipType]||{};
      if(ship.cannons==='front'){
        e.char.position.x+=Math.sin(e.boat.rotation.y)*2;
        e.char.position.z+=Math.cos(e.boat.rotation.y)*2;
      }else{
        // Stand at helm (stern)
        e.char.position.x-=Math.sin(e.boat.rotation.y)*5;
        e.char.position.z-=Math.cos(e.boat.rotation.y)*5;
      }
      e.char.position.y=e.boat.position.y+1.5;

      // Character faces mouse direction (only for me)
      if(isMe){
        const dx=mouseWorld.x-e.char.position.x,dz=mouseWorld.z-e.char.position.z;
        e.char.rotation.y=Math.atan2(dx,dz);
      }else{
        e.char.rotation.y=e.boat.rotation.y;
      }
    }else{
      e.char.position.x+=(p.cx-e.char.position.x)*0.2;
      e.char.position.z+=(p.cz-e.char.position.z)*0.2;
      e.char.position.y+=(p.cy-e.char.position.y)*0.2;
      let cd=p.cRot-e.char.rotation.y;
      while(cd>Math.PI)cd-=Math.PI*2;while(cd<-Math.PI)cd+=Math.PI*2;
      e.char.rotation.y+=cd*0.2;
      // Walk anim
      const swing=Math.sin(time*8)*0.4;
      ['legL','legR','armL','armR'].forEach(n=>{
        const m=e.char.getObjectByName(n);
        if(m)m.rotation.x=n.includes('L')?swing:-swing;
      });
    }

    // Name
    if(e.lastName!==p.name){
      if(e.nameTag.parent)e.nameTag.parent.remove(e.nameTag);
      e.nameTag=createNameSprite(p.name,isMe);
      e.nameTag.position.y=p.onBoat?(p.shipType==='warship'?22:9):5.5;
      e.lastName=p.name;
    }
    const attachTo=p.onBoat?'boat':'char';
    if(e.nameOn!==attachTo){
      if(e.nameTag.parent)e.nameTag.parent.remove(e.nameTag);
      (p.onBoat?e.boat:e.char).add(e.nameTag);
      e.nameTag.position.y=p.onBoat?(p.shipType==='warship'?22:9):5.5;
      e.nameOn=attachTo;
    }
  }

  for(const id in entities)if(!active.has(id))removeEntity(id);

  // Aim marker & landing indicators
  const me=gameState.players[myId];
  if(me&&me.onBoat){
    aimMarker.visible=true;
    aimMarker.position.x=mouseWorld.x;aimMarker.position.z=mouseWorld.z;

    const ship=shipDefs[me.shipType]||{};
    if(ship.cannons==='side'){
      // Show 3 landing indicators
      const dx=mouseWorld.x-me.bx,dz=mouseWorld.z-me.bz;
      const aimAng=Math.atan2(dx,dz);
      let rel=aimAng-me.bRot;while(rel>Math.PI)rel-=Math.PI*2;while(rel<-Math.PI)rel+=Math.PI*2;
      for(let i=0;i<3;i++){
        landingIndicators[i].visible=true;
        const spread=(i-1)*6;
        landingIndicators[i].position.x=mouseWorld.x+Math.sin(me.bRot)*spread;
        landingIndicators[i].position.z=mouseWorld.z+Math.cos(me.bRot)*spread;
      }
    }else{
      landingIndicators.forEach(l=>l.visible=false);
    }
  }else{
    aimMarker.visible=false;
    landingIndicators.forEach(l=>l.visible=false);
  }

  // Cannonballs
  const cbs=gameState.cannonballs||[];
  for(let i=0;i<cbs.length;i++){const m=getCB(i);m.visible=true;m.position.set(cbs[i].x,cbs[i].y,cbs[i].z);}
  for(let i=cbs.length;i<cbMeshes.length;i++)cbMeshes[i].visible=false;

  // Camera
  if(me&&entities[myId]){
    const e=entities[myId];
    let tgt,rot,cd,ch;
    if(me.onBoat){tgt=e.boat.position;rot=e.boat.rotation.y;cd=45;ch=25;}
    else{tgt=e.char.position;rot=e.char.rotation.y;cd=22;ch=14;}
    const tx=tgt.x-Math.sin(rot)*cd,tz=tgt.z-Math.cos(rot)*cd;
    camera.position.x+=(tx-camera.position.x)*0.06;
    camera.position.z+=(tz-camera.position.z)*0.06;
    camera.position.y+=(tgt.y+ch-camera.position.y)*0.06;
    camera.lookAt(tgt.x,tgt.y+3,tgt.z);
  }

  updateHUD();
  drawMinimap();

  // Crosshair follows mouse
  const ch=document.getElementById('crosshair');
  ch.style.left=(mouseX-8)+'px';ch.style.top=(mouseY-8)+'px';

  renderer.render(scene,camera);
}

// ── HUD ──
function updateHUD(){
  const me=gameState.players[myId];if(!me)return;

  if(me.gold!==undefined)myGold=me.gold;
  if(me.shipType)myShipType=me.shipType;

  document.getElementById('gold-display').textContent=`${myGold} Gold`;

  const pct=Math.max(0,me.hp)/(me.maxHp||100);
  document.getElementById('health-bar').style.width=(pct*100)+'%';
  document.getElementById('health-text').textContent=`${Math.max(0,me.hp)} / ${me.maxHp||100}`;

  const sn=['Stopped','Half Sail','Full Sail'];
  const si=document.getElementById('sails-indicator');
  si.style.display=me.onBoat?'block':'none';
  si.textContent=sn[me.sails||1];

  // Reload bar
  const ship=shipDefs[me.shipType]||{reloadMs:1000};
  const rb=document.getElementById('reload-bar');
  const rw=document.getElementById('reload-bar-wrap');
  rw.style.display=me.onBoat?'block':'none';

  const sl=document.getElementById('state-label');
  if(me.onBoat)sl.textContent=shipDefs[me.shipType]?.name||'Boat';
  else if(me.swimming)sl.textContent='Swimming!';
  else sl.textContent='On Land [B=Shop]';

  // Action prompt
  const ap=document.getElementById('action-prompt');
  if(me.onBoat){
    let near=false;
    for(const i of islandsData){const dx=me.bx-i.x,dz=me.bz-i.z;if(Math.sqrt(dx*dx+dz*dz)<i.radius+14){near=true;break;}}
    ap.style.display=near?'block':'none';ap.textContent=near?'Press E to disembark':'';
  }else if(!me.swimming){
    const dx=me.cx-me.bx,dz=me.cz-me.bz;
    const nb=dx*dx+dz*dz<324;
    ap.style.display=nb?'block':'none';ap.textContent=nb?'Press E to board':'';
  }else ap.style.display='none';

  document.getElementById('player-count').textContent=`${Object.keys(gameState.players).length} online`;

  const sorted=Object.entries(gameState.players).sort((a,b)=>b[1].score-a[1].score).slice(0,8);
  document.getElementById('score-list').innerHTML=sorted.map(([id,p])=>
    `<div class="sr${id===myId?' me':''}"><span>${p.name}</span><span>${p.score} · ${p.gold}g</span></div>`
  ).join('');
}

// ── MINIMAP ──
function drawMinimap(){
  const c=mmCtx,w=200,h=200,s=w/mapSize;
  c.clearRect(0,0,w,h);
  c.fillStyle='rgba(8,35,60,.9)';c.fillRect(0,0,w,h);

  // Grid
  c.strokeStyle='rgba(255,255,255,.06)';c.lineWidth=1;
  for(let i=0;i<5;i++){const p=i*w/4;c.beginPath();c.moveTo(p,0);c.lineTo(p,h);c.stroke();c.beginPath();c.moveTo(0,p);c.lineTo(w,p);c.stroke();}

  c.fillStyle='#4a8a3a';
  for(const i of islandsData){c.beginPath();c.arc(w/2+i.x*s,h/2+i.z*s,Math.max(5,i.radius*s),0,Math.PI*2);c.fill();}

  // Island names
  c.fillStyle='rgba(255,255,255,.4)';c.font='8px sans-serif';c.textAlign='center';
  for(const i of islandsData)c.fillText(i.name||'',w/2+i.x*s,h/2+i.z*s+i.radius*s+10);

  for(const id in gameState.players){
    const p=gameState.players[id];const isMe=id===myId;
    const px=w/2+p.bx*s,py=h/2+p.bz*s;
    c.fillStyle=isMe?'#2ecc71':'#e74c3c';
    c.beginPath();c.arc(px,py,isMe?4:3,0,Math.PI*2);c.fill();
    if(isMe){
      const rot=p.onBoat?p.bRot:p.cRot;
      c.strokeStyle='#2ecc71';c.lineWidth=2;
      c.beginPath();c.moveTo(px,py);c.lineTo(px+Math.sin(rot)*8,py+Math.cos(rot)*8);c.stroke();
      if(!p.onBoat){
        c.fillStyle='#f1c40f';c.beginPath();c.arc(w/2+p.cx*s,h/2+p.cz*s,3,0,Math.PI*2);c.fill();
      }
    }
  }

  c.strokeStyle='rgba(255,255,255,.15)';c.lineWidth=1;c.strokeRect(0,0,w,h);
}
