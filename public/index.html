<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krew3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a4a6e;font-family:'Segoe UI',sans-serif;user-select:none}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:flex;justify-content:center;align-items:center;flex-direction:column;color:#fff}
#overlay h2{color:#f1c40f;font-size:28px;margin-bottom:6px}
#overlay .sub{opacity:.5;font-size:12px;margin-bottom:18px}
#overlay input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:10px 14px;border-radius:8px;font-size:15px;outline:none;width:200px;text-align:center;margin-bottom:10px}
#overlay input::placeholder{color:rgba(255,255,255,.3)}
#overlay button{padding:10px 30px;background:#f1c40f;color:#000;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer}
#overlay button:hover{background:#f39c12}
#overlay button:disabled{background:#555;color:#999;cursor:default}
#conn-msg{color:#f1c40f;font-size:13px;margin-bottom:12px}

/* HUD */
.hud{position:fixed;z-index:10}
#ctrl{top:10px;left:10px;background:rgba(0,0,0,.55);color:#fff;padding:8px 12px;border-radius:8px;font-size:10px;border:1px solid rgba(255,255,255,.1);line-height:1.7;display:none}
#ctrl kbd{background:rgba(255,255,255,.12);padding:1px 4px;border-radius:3px;font-size:9px}
#gold{top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#f1c40f;font-size:14px;font-weight:bold;padding:5px 18px;border-radius:8px;display:none;border:1px solid rgba(241,196,15,.3)}
#hp-wrap{bottom:25px;left:50%;transform:translateX(-50%);width:260px;height:20px;background:rgba(0,0,0,.55);border:2px solid rgba(255,255,255,.2);border-radius:10px;overflow:hidden;display:none}
#hp-bar{height:100%;width:100%;background:linear-gradient(90deg,#e74c3c,#f1c40f 50%,#2ecc71);transition:width .3s;border-radius:10px}
#hp-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-weight:bold;font-size:11px;text-shadow:1px 1px 2px #000}
#sails{bottom:52px;left:50%;transform:translateX(-50%);color:#fff;font-size:11px;display:none;background:rgba(0,0,0,.4);padding:2px 10px;border-radius:6px}
#prompt{bottom:85px;left:50%;transform:translateX(-50%);color:#f1c40f;font-size:14px;font-weight:bold;display:none;background:rgba(0,0,0,.6);padding:6px 16px;border-radius:8px}
#scoreboard{top:10px;right:10px;background:rgba(0,0,0,.5);color:#fff;padding:8px 14px;border-radius:8px;font-size:11px;display:none;border:1px solid rgba(255,255,255,.1);max-height:200px}
#scoreboard h3{margin-bottom:4px;color:#f1c40f;font-size:12px}
.sr{display:flex;justify-content:space-between;gap:14px;padding:1px 0}.sr.me{color:#2ecc71;font-weight:bold}
#lbl{top:72px;left:10px;color:rgba(255,255,255,.5);font-size:10px;display:none;background:rgba(0,0,0,.3);padding:2px 6px;border-radius:4px}
#pc{bottom:4px;left:10px;color:rgba(255,255,255,.3);font-size:9px;display:none}
#minimap{bottom:15px;right:15px;width:200px;height:200px;background:rgba(10,30,60,.85);border:2px solid rgba(255,255,255,.2);border-radius:8px;display:none;cursor:crosshair}
#tphint{bottom:220px;right:15px;color:rgba(255,255,255,.3);font-size:9px;display:none;text-align:center;width:200px}
#cross{position:fixed;pointer-events:none;z-index:5;display:none;width:16px;height:16px}
#cross::before,#cross::after{content:'';position:absolute;background:rgba(255,255,255,.6)}
#cross::before{width:16px;height:2px;top:7px;left:0}
#cross::after{width:2px;height:16px;top:0;left:7px}

#death{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;z-index:100;flex-direction:column;color:#fff}
#death h1{font-size:40px;color:#e74c3c}

/* Market */
#market{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:150;display:none;justify-content:center;align-items:center}
#market-box{background:rgba(20,20,30,.95);border:2px solid rgba(241,196,15,.4);border-radius:14px;padding:24px 30px;color:#fff;min-width:460px}
#market-box h2{color:#f1c40f;margin-bottom:4px}
#mgold{color:#f1c40f;margin-bottom:14px;font-size:13px}
.sc{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px 16px;margin-bottom:8px}
.sc:hover{border-color:rgba(241,196,15,.4)}
.si h3{font-size:14px;margin-bottom:2px}.si p{font-size:11px;opacity:.6}
.sb{padding:6px 16px;border:none;border-radius:6px;font-size:12px;font-weight:bold;cursor:pointer;min-width:80px}
.sb.buy{background:#f1c40f;color:#000}.sb.eq{background:#3498db;color:#fff}.sb.on{background:#555;color:#aaa;cursor:default}
#mclose{display:block;margin:12px auto 0;padding:6px 20px;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:6px;cursor:pointer}
#smsg{color:#2ecc71;font-size:12px;text-align:center;margin-top:6px;min-height:16px}
</style>
</head>
<body>

<!-- OVERLAY (name + connection) -->
<div id="overlay">
  <h2>KREW 3D</h2>
  <div class="sub">Multiplayer Pirate Battle</div>
  <div id="conn-msg">Connecting to server...</div>
  <input id="nin" type="text" placeholder="Your pirate name..." maxlength="16">
  <button id="nbtn" disabled>Connecting...</button>
</div>

<!-- HUD (hidden until game starts) -->
<div id="ctrl" class="hud"><strong style="color:#f1c40f">Controls</strong><br><kbd>W</kbd><kbd>S</kbd><kbd>A</kbd><kbd>D</kbd> Move<br><kbd>Mouse</kbd> Aim · <kbd>Click</kbd> Fire<br><kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> Sails · <kbd>E</kbd> Board/Leave<br><kbd>Space</kbd> Jump · <kbd>B</kbd> Shop</div>
<div id="gold" class="hud"></div>
<div id="hp-wrap" class="hud"><div id="hp-bar"></div><div id="hp-text"></div></div>
<div id="sails" class="hud"></div>
<div id="prompt" class="hud"></div>
<div id="scoreboard" class="hud"><h3>Scoreboard</h3><div id="slist"></div></div>
<div id="lbl" class="hud"></div>
<div id="pc" class="hud"></div>
<canvas id="minimap" class="hud" width="200" height="200"></canvas>
<div id="tphint" class="hud">Click map to teleport</div>
<div id="cross"></div>

<div id="death"><h1>SUNK!</h1><p id="dmsg"></p><p style="margin-top:10px;opacity:.4;font-size:12px">Respawning...</p></div>

<div id="market"><div id="market-box">
  <h2>Ship Market</h2><div id="mgold"></div><div id="slist2"></div>
  <div id="smsg"></div><button id="mclose">Close [B]</button>
</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
// ═══ GLOBALS ═══
let socket, scene, camera, renderer, clock;
let myId=null, MAP=1600, ISL=[], ROCKS=[], SHIPDEFS={};
let water, aimRing, dots=[];
let ents={}, cbPool=[];
let GS={players:{},cbs:[]};
let keys={}, mX=0, mY=0, mW={x:0,z:0};
let playing=false, mktOpen=false;
let myGold=5000, myOwned=['rowboat'], myShip='rowboat';

const ray=new THREE.Raycaster(), mv=new THREE.Vector2(), wP=new THREE.Plane(new THREE.Vector3(0,1,0),0);
const mmC=document.getElementById('minimap'), mmX=mmC.getContext('2d');

// ═══ STEP 1: CONNECT SOCKET IMMEDIATELY ═══
(function boot(){
  console.log('Booting...');
  socket = io({ reconnection:true, reconnectionDelay:1000, transports:['polling','websocket'] });

  socket.on('connect', () => {
    console.log('Socket connected:', socket.id);
    document.getElementById('conn-msg').textContent = 'Connected! Enter your name:';
    document.getElementById('nbtn').disabled = false;
    document.getElementById('nbtn').textContent = 'SET SAIL!';
  });

  socket.on('disconnect', () => {
    console.log('Disconnected');
    if (!playing) {
      document.getElementById('conn-msg').textContent = 'Disconnected. Reconnecting...';
      document.getElementById('nbtn').disabled = true;
      document.getElementById('nbtn').textContent = 'Reconnecting...';
    }
  });

  socket.on('init', data => {
    console.log('Init received:', data.id, 'players:', Object.keys(data.state.players).length);
    const oldId = myId;
    myId = data.id;
    MAP = data.map;
    SHIPDEFS = data.ships || {};

    // Apply initial state
    GS = data.state;

    // Build world (only first time)
    if (!ISL.length && data.islands) {
      ISL = data.islands;
      ROCKS = data.rocks || [];
      for (const i of ISL) buildIsland(i);
      buildRocks();
    }

    // Remove old entity if reconnected
    if (oldId && oldId !== myId) rmEnt(oldId);

    // Position camera to spawn
    if (data.spawnX !== undefined) {
      const r = data.spawnR || 0;
      camera.position.set(data.spawnX - Math.sin(r)*45, 25, data.spawnZ - Math.cos(r)*45);
      camera.lookAt(data.spawnX, 3, data.spawnZ);
    }

    // Re-send name if already playing
    if (playing) socket.emit('setName', document.getElementById('nin').value.trim() || 'Pirate');
  });

  socket.on('s', s => { GS = s; });
  socket.on('left', rmEnt);
  socket.on('sunk', d => {
    document.getElementById('dmsg').textContent = `Sunk by ${d.by}!`;
    document.getElementById('death').style.display = 'flex';
    setTimeout(() => document.getElementById('death').style.display = 'none', 2500);
  });
  socket.on('msg', m => { document.getElementById('smsg').textContent = m; });
  socket.on('upd', d => {
    if (d.gold !== undefined) myGold = d.gold;
    if (d.owned) myOwned = d.owned;
    if (d.ship) myShip = d.ship;
    if (mktOpen) renderMarket();
  });
})();

// ═══ STEP 2: START GAME ON BUTTON CLICK ═══
document.getElementById('nbtn').onclick = startGame;
document.getElementById('nin').onkeydown = e => { if (e.key === 'Enter' && !document.getElementById('nbtn').disabled) startGame(); };

function startGame() {
  const name = document.getElementById('nin').value.trim() || 'Pirate';
  document.getElementById('overlay').style.display = 'none';

  // Show HUD
  ['ctrl','gold','hp-wrap','sails','scoreboard','minimap','pc','lbl','cross','tphint'].forEach(x => document.getElementById(x).style.display = 'block');

  playing = true;
  initThree(); // Only creates Three.js scene
  socket.emit('setName', name);
  animate();
}

// ═══ THREE.JS SETUP ═══
function initThree() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x5a9abf, 0.0008);

  camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 1, 3000);
  // Camera will be repositioned by init event, but set a safe default
  camera.position.set(0, 50, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x7ec8e3);
  document.body.appendChild(renderer.domElement);
  clock = new THREE.Clock();

  scene.add(new THREE.AmbientLight(0xffffff, 0.45));
  const sun = new THREE.DirectionalLight(0xfff0d0, 1.1);
  sun.position.set(400, 500, 200); scene.add(sun);
  scene.add(new THREE.HemisphereLight(0x87ceeb, 0x3a7a5a, 0.3));

  water = new THREE.Mesh(
    new THREE.PlaneGeometry(5000, 5000, 60, 60),
    new THREE.MeshPhongMaterial({ color: 0x0a4a6e, transparent: true, opacity: 0.9, shininess: 60, specular: 0x1a5577 })
  );
  water.rotation.x = -Math.PI / 2;
  scene.add(water);

  aimRing = new THREE.Mesh(
    new THREE.RingGeometry(1.5, 2.2, 20),
    new THREE.MeshBasicMaterial({ color: 0xff3333, transparent: true, opacity: 0.5, side: THREE.DoubleSide })
  );
  aimRing.rotation.x = -Math.PI / 2; aimRing.position.y = 0.5; aimRing.visible = false;
  scene.add(aimRing);

  for (let i = 0; i < 3; i++) {
    const d = new THREE.Mesh(new THREE.RingGeometry(1, 1.6, 14), new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.45, side: THREE.DoubleSide }));
    d.rotation.x = -Math.PI / 2; d.position.y = 0.3; d.visible = false; scene.add(d); dots.push(d);
  }

  // Build islands that were already received
  if (ISL.length) { for (const i of ISL) buildIsland(i); buildRocks(); }

  // Events
  window.addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
  window.addEventListener('keydown', e => {
    if (!playing) return;
    if (mktOpen && e.code === 'KeyB') { toggleMkt(); return; }
    if (mktOpen) return;
    keys[e.code] = true;
    if (e.code === 'Digit1') socket.emit('setSails', 0);
    if (e.code === 'Digit2') socket.emit('setSails', 1);
    if (e.code === 'Digit3') socket.emit('setSails', 2);
    if (e.code === 'KeyB') toggleMkt();
    if (e.code === 'Space') e.preventDefault();
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });
  window.addEventListener('blur', () => { keys = {}; });
  window.addEventListener('mousemove', e => { mX = e.clientX; mY = e.clientY; });
  window.addEventListener('mousedown', e => { if (!mktOpen && playing && e.button === 0) socket.emit('fire'); });

  mmC.addEventListener('click', e => {
    const r = mmC.getBoundingClientRect();
    socket.emit('tp', { x: ((e.clientX - r.left) / 200 - 0.5) * MAP, z: ((e.clientY - r.top) / 200 - 0.5) * MAP });
  });
  document.getElementById('mclose').onclick = () => toggleMkt();
}

function toggleMkt() {
  const me = GS.players[myId]; if (!me) return;
  if (!mktOpen && me.onBoat) return;
  mktOpen = !mktOpen;
  document.getElementById('market').style.display = mktOpen ? 'flex' : 'none';
  if (mktOpen) renderMarket();
}

function renderMarket() {
  const me = GS.players[myId]; if (me) myGold = me.gold;
  document.getElementById('mgold').textContent = `Gold: ${myGold}`;
  const el = document.getElementById('slist2'); el.innerHTML = '';
  for (const [t, d] of Object.entries(SHIPDEFS)) {
    const own = myOwned.includes(t), eq = myShip === t, can = myGold >= d.price;
    let bc, bt;
    if (eq) { bc = 'on'; bt = 'Equipped'; } else if (own) { bc = 'eq'; bt = 'Equip'; } else if (can) { bc = 'buy'; bt = `Buy ${d.price}g`; } else { bc = 'on'; bt = `${d.price}g`; }
    const ci = d.cannons === 'side' ? `${d.count} side cannons` : 'Front cannon';
    const card = document.createElement('div'); card.className = 'sc';
    card.innerHTML = `<div class="si"><h3>${d.name}</h3><p>HP:${d.hp} Spd:${Math.round(d.speed * 100)} ${ci}</p></div><button class="sb ${bc}">${bt}</button>`;
    el.appendChild(card);
    card.querySelector('button').onclick = () => { if (eq) return; if (own) socket.emit('equip', t); else socket.emit('buy', t); };
  }
}

// ═══ 3D BUILDERS ═══
function M(g, c, p, r) { const m = new THREE.Mesh(g, new THREE.MeshPhongMaterial({ color: c })); if (p) m.position.set(p[0], p[1], p[2]); if (r) m.rotation.set(r[0], r[1], r[2]); return m; }

function mkRowboat() {
  const g = new THREE.Group();
  g.add(M(new THREE.BoxGeometry(3.5, 1.2, 8), 0x8B6914, [0, .7, 0]));
  for (const s of [-1, 1]) g.add(M(new THREE.BoxGeometry(.25, 1, 8.2), 0x6B4E12, [s * 1.6, 1.4, 0]));
  g.add(M(new THREE.ConeGeometry(1.7, 2.5, 4), 0x8B6914, [0, .8, 5], [Math.PI / 2, 0, 0]));
  g.add(M(new THREE.BoxGeometry(3.2, 1.6, .3), 0x6B4E12, [0, 1.2, -4.2]));
  g.add(M(new THREE.CylinderGeometry(.1, .13, 6, 6), 0x543210, [0, 4.2, -1]));
  const sl = M(new THREE.PlaneGeometry(2.8, 3.8), 0xf0e8d0, [0, 5.5, -.8]); sl.material.side = THREE.DoubleSide; sl.material.transparent = true; sl.material.opacity = .85; sl.name = 'sail'; g.add(sl);
  g.add(M(new THREE.CylinderGeometry(.35, .4, .4, 8), 0x333333, [0, 1.5, 3]));
  const b = M(new THREE.CylinderGeometry(.15, .2, 2, 8), 0x1a1a1a, [0, 1.7, 4.2], [Math.PI / 2, 0, 0]); b.name = 'barrel'; g.add(b);
  return g;
}

function mkWarship() {
  const g = new THREE.Group();
  g.add(M(new THREE.BoxGeometry(10, 3.5, 20), 0x5a3015, [0, 1.8, 0]));
  g.add(M(new THREE.BoxGeometry(9, .3, 18), 0xC4A060, [0, 3.8, 0]));
  g.add(M(new THREE.BoxGeometry(8, 2.5, 5), 0x6B3E1A, [0, 5, -7]));
  g.add(M(new THREE.ConeGeometry(5, 6, 4), 0x5a3015, [0, 1.8, 13], [Math.PI / 2, 0, 0]));
  for (const z of [-2, 4]) {
    g.add(M(new THREE.CylinderGeometry(.2, .25, 14, 8), 0x543210, [0, 11, z]));
    const s = M(new THREE.PlaneGeometry(6, 8), 0xe8dfc8, [0, 13, z + .3]); s.material.side = THREE.DoubleSide; s.material.transparent = true; s.material.opacity = .85; s.name = z === -2 ? 'sail' : 'sail2'; g.add(s);
  }
  for (const sd of [-1, 1]) for (let i = -1; i <= 1; i++) { const c = M(new THREE.CylinderGeometry(.2, .3, 1.8, 6), 0x222222, [sd * 5.2, 3.8, i * 4]); c.rotation.z = sd * Math.PI / 2; g.add(c); }
  g.add(M(new THREE.PlaneGeometry(2, 1.2), 0x111111, [0, 18.5, -2]));
  return g;
}

function mkTrade() {
  const g = new THREE.Group();
  g.add(M(new THREE.BoxGeometry(6, 2.5, 14), 0x6B4E12, [0, 1.5, 0]));
  for (const s of [-1, 1]) g.add(M(new THREE.BoxGeometry(.3, 2, 14.5), 0x543210, [s * 3.15, 2.8, 0]));
  g.add(M(new THREE.ConeGeometry(3.2, 4, 4), 0x6B4E12, [0, 1.5, 9], [Math.PI / 2, 0, 0]));
  g.add(M(new THREE.BoxGeometry(5.5, .2, 13), 0xC4A060, [0, 3, 0]));
  g.add(M(new THREE.BoxGeometry(4, 2.5, 4), 0x7a5020, [0, 4.5, -4.5]));
  g.add(M(new THREE.CylinderGeometry(.18, .22, 12, 8), 0x543210, [0, 9.5, 1]));
  const s = M(new THREE.PlaneGeometry(7, 9), 0xe8dfc8, [0, 11, 2]); s.material.side = THREE.DoubleSide; s.material.transparent = true; s.material.opacity = .85; s.name = 'sail'; g.add(s);
  const s2 = M(new THREE.PlaneGeometry(5, 7), 0xddd8c0, [0, 10, 5]); s2.material.side = THREE.DoubleSide; s2.material.transparent = true; s2.material.opacity = .8; s2.name = 'sail2'; g.add(s2);
  g.add(M(new THREE.CylinderGeometry(.3, .35, .4, 8), 0x333333, [0, 3.3, 5.5]));
  const b = M(new THREE.CylinderGeometry(.15, .2, 2.2, 8), 0x1a1a1a, [0, 3.5, 6.8], [Math.PI / 2, 0, 0]); b.name = 'barrel'; g.add(b);
  return g;
}

function mkChar(me) {
  const g = new THREE.Group(), c = me ? 0x2e86c1 : 0xc0392b;
  g.add(M(new THREE.BoxGeometry(.9, 1.5, .6), c, [0, 2.3, 0]));
  g.add(M(new THREE.SphereGeometry(.38, 8, 8), 0xf0c090, [0, 3.4, 0]));
  g.add(M(new THREE.CylinderGeometry(.25, .45, .45, 8), 0x1a1a1a, [0, 3.9, 0]));
  for (const s of [-.22, .22]) { const l = M(new THREE.BoxGeometry(.3, 1, .35), 0x4a3520, [s, .9, 0]); l.name = s < 0 ? 'lL' : 'lR'; g.add(l); }
  for (const s of [-.6, .6]) { const a = M(new THREE.BoxGeometry(.25, 1, .25), c, [s, 2.3, 0]); a.name = s < 0 ? 'aL' : 'aR'; g.add(a); }
  return g;
}

function mkTag(name, me) {
  const c = document.createElement('canvas'); c.width = 256; c.height = 40;
  const x = c.getContext('2d');
  x.fillStyle = me ? 'rgba(46,134,193,.65)' : 'rgba(0,0,0,.5)';
  x.beginPath(); x.roundRect(4, 2, 248, 36, 5); x.fill();
  x.fillStyle = '#fff'; x.font = 'bold 18px sans-serif'; x.textAlign = 'center'; x.fillText(name, 128, 28);
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true }));
  s.scale.set(10, 2.5, 1); return s;
}

function buildIsland(d) {
  const g = new THREE.Group();
  g.add(M(new THREE.CylinderGeometry(d.r * .92, d.r, 3.5, 28), 0x4a8a3a, [0, 1.8, 0]));
  g.add(M(new THREE.CylinderGeometry(d.r, d.r + 10, 2, 28), 0xf0d9a0, [0, .6, 0]));
  for (let i = 0; i < 3; i++) {
    const r = d.r * (.15 + Math.random() * .25), a = Math.random() * Math.PI * 2, dd = Math.random() * d.r * .4;
    const h = M(new THREE.SphereGeometry(r, 8, 6), 0x3d7a30, [Math.cos(a) * dd, r * .35 + 2.5, Math.sin(a) * dd]);
    h.scale.y = .45; g.add(h);
  }
  for (let i = 0; i < 4 + Math.floor(d.r / 15); i++) {
    const a = Math.random() * Math.PI * 2, dd = 5 + Math.random() * (d.r - 15);
    const p = mkPalm(); p.position.set(Math.cos(a) * dd, 2.8, Math.sin(a) * dd); p.scale.setScalar(.6 + Math.random() * .4); g.add(p);
  }
  g.position.set(d.x, 0, d.z); scene.add(g);
}

function mkPalm() {
  const g = new THREE.Group();
  g.add(M(new THREE.CylinderGeometry(.2, .35, 6, 6), 0x8B6914, [0, 3, 0], [0, 0, (Math.random() - .5) * .2]));
  for (let i = 0; i < 5; i++) { const a = (i / 5) * Math.PI * 2; g.add(M(new THREE.ConeGeometry(2, 3, 4), 0x228B22, [Math.cos(a), 6.5, Math.sin(a)], [Math.sin(a) * .6, 0, Math.cos(a) * .6])); }
  return g;
}

function buildRocks() {
  for (const o of ROCKS) { const m = M(new THREE.SphereGeometry(o.r, 6, 6), 0x666655, [o.x, 3 + o.r * .5, o.z]); m.scale.y = .6; scene.add(m); }
}

// ═══ ENTITY MANAGEMENT ═══
function getEnt(id) {
  if (!ents[id]) {
    const me = id === myId, ch = mkChar(me); scene.add(ch);
    const tg = mkTag('...', me); tg.position.y = 5.5;
    ents[id] = { boat: null, bt: null, char: ch, tag: tg, tn: '', to: null };
  }
  return ents[id];
}
function ensBoat(e, type) {
  if (e.bt === type) return;
  if (e.boat) scene.remove(e.boat);
  e.boat = type === 'warship' ? mkWarship() : type === 'tradeship' ? mkTrade() : mkRowboat();
  scene.add(e.boat); e.bt = type;
}
function rmEnt(id) { const e = ents[id]; if (!e) return; if (e.boat) scene.remove(e.boat); scene.remove(e.char); if (e.tag.parent) e.tag.parent.remove(e.tag); delete ents[id]; }

// ═══ CANNONBALL POOL ═══
const cbG = new THREE.SphereGeometry(.4, 6, 6), cbM = new THREE.MeshPhongMaterial({ color: 0x1a1a1a });
function getCB(i) { while (cbPool.length <= i) { const m = new THREE.Mesh(cbG, cbM); m.visible = false; scene.add(m); cbPool.push(m); } return cbPool[i]; }

// ═══ MAIN LOOP ═══
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Send input
  if (socket?.connected && myId && !mktOpen) {
    socket.volatile.emit('input', {
      fwd: !!(keys['KeyW'] || keys['ArrowUp']), back: !!(keys['KeyS'] || keys['ArrowDown']),
      left: !!(keys['KeyA'] || keys['ArrowLeft']), right: !!(keys['KeyD'] || keys['ArrowRight']),
      act: !!keys['KeyE'], jump: !!keys['Space'],
    });
  }

  // Mouse aim
  mv.x = (mX / innerWidth) * 2 - 1; mv.y = -(mY / innerHeight) * 2 + 1;
  ray.setFromCamera(mv, camera);
  const hit = new THREE.Vector3();
  if (ray.ray.intersectPlane(wP, hit)) { mW.x = hit.x; mW.z = hit.z; socket?.emit('aim', { x: hit.x, z: hit.z }); }

  // Water anim
  const wp = water.geometry.attributes.position;
  for (let i = 0; i < wp.count; i++) { const x = wp.getX(i), y = wp.getY(i); wp.setZ(i, Math.sin(x * .02 + t * 1.2) * .6 + Math.sin(y * .025 + t) * .5 + Math.sin((x + y) * .012 + t * .6) * .7); }
  wp.needsUpdate = true; water.geometry.computeVertexNormals();

  // Update entities
  const active = new Set();
  for (const id in GS.players) {
    active.add(id);
    const p = GS.players[id], e = getEnt(id), me = id === myId;
    ensBoat(e, p.ship);

    // Boat
    e.boat.position.x += (p.bx - e.boat.position.x) * .15;
    e.boat.position.z += (p.bz - e.boat.position.z) * .15;
    e.boat.position.y = Math.sin(t * 1.8 + p.bx * .07) * .35 + .3;
    let bd = p.br - e.boat.rotation.y; while (bd > Math.PI) bd -= Math.PI * 2; while (bd < -Math.PI) bd += Math.PI * 2;
    e.boat.rotation.y += bd * .15; e.boat.rotation.z = -bd * .2; e.boat.rotation.x = Math.sin(t * 1.3) * .02;

    // Sails
    const sl = e.boat.getObjectByName('sail'); if (sl) { const ts = [.05, .5, 1][p.sails || 1]; sl.scale.y += (ts - sl.scale.y) * .1; }
    const s2 = e.boat.getObjectByName('sail2'); if (s2) { const ts = [.05, .4, .9][p.sails || 1]; s2.scale.y += (ts - s2.scale.y) * .1; }

    // Barrel aim
    if (me && p.onBoat) { const br = e.boat.getObjectByName('barrel'); if (br) { const d = Math.hypot(mW.x - e.boat.position.x, mW.z - e.boat.position.z); br.rotation.x = Math.PI / 2 - Math.min(.5, Math.max(-.1, d * .003)); } }

    // Character
    if (p.onBoat) {
      e.char.position.copy(e.boat.position);
      const sd = SHIPDEFS[p.ship] || {};
      if (sd.cannons === 'front') { e.char.position.x += Math.sin(e.boat.rotation.y) * 2; e.char.position.z += Math.cos(e.boat.rotation.y) * 2; }
      else { e.char.position.x -= Math.sin(e.boat.rotation.y) * 5; e.char.position.z -= Math.cos(e.boat.rotation.y) * 5; }
      e.char.position.y = e.boat.position.y + 1.5;
      e.char.rotation.y = me ? Math.atan2(mW.x - e.char.position.x, mW.z - e.char.position.z) : e.boat.rotation.y;
    } else {
      e.char.position.x += (p.cx - e.char.position.x) * .2; e.char.position.z += (p.cz - e.char.position.z) * .2; e.char.position.y += (p.cy - e.char.position.y) * .2;
      let cd = p.cr - e.char.rotation.y; while (cd > Math.PI) cd -= Math.PI * 2; while (cd < -Math.PI) cd += Math.PI * 2; e.char.rotation.y += cd * .2;
      const sw = Math.sin(t * 8) * .4;
      ['lL', 'lR', 'aL', 'aR'].forEach(n => { const m = e.char.getObjectByName(n); if (m) m.rotation.x = n.includes('L') ? sw : -sw; });
    }

    // Name tag
    if (e.tn !== p.name) { if (e.tag.parent) e.tag.parent.remove(e.tag); e.tag = mkTag(p.name, me); e.tag.position.y = p.onBoat ? (p.ship === 'warship' ? 22 : 9) : 5.5; e.tn = p.name; }
    const att = p.onBoat ? 'b' : 'c';
    if (e.to !== att) { if (e.tag.parent) e.tag.parent.remove(e.tag); (p.onBoat ? e.boat : e.char).add(e.tag); e.tag.position.y = p.onBoat ? (p.ship === 'warship' ? 22 : 9) : 5.5; e.to = att; }
  }
  for (const id in ents) if (!active.has(id)) rmEnt(id);

  // Aim ring + landing dots
  const me = GS.players[myId];
  if (me && me.onBoat) {
    aimRing.visible = true; aimRing.position.x = mW.x; aimRing.position.z = mW.z;
    const sd = SHIPDEFS[me.ship] || {};
    if (sd.cannons === 'side') {
      for (let i = 0; i < 3; i++) { dots[i].visible = true; const sp = (i - 1) * 7; dots[i].position.x = mW.x + Math.sin(me.br) * sp; dots[i].position.z = mW.z + Math.cos(me.br) * sp; }
    } else dots.forEach(d => d.visible = false);
  } else { aimRing.visible = false; dots.forEach(d => d.visible = false); }

  // Cannonballs
  const cbArr = GS.cbs || [];
  for (let i = 0; i < cbArr.length; i++) { const m = getCB(i); m.visible = true; m.position.set(cbArr[i].x, cbArr[i].y, cbArr[i].z); }
  for (let i = cbArr.length; i < cbPool.length; i++) cbPool[i].visible = false;

  // Camera
  if (me && ents[myId]) {
    const e = ents[myId]; let tgt, rot, cd, ch;
    if (me.onBoat) { tgt = e.boat.position; rot = e.boat.rotation.y; cd = 45; ch = 25; }
    else { tgt = e.char.position; rot = e.char.rotation.y; cd = 22; ch = 14; }
    camera.position.x += (tgt.x - Math.sin(rot) * cd - camera.position.x) * .06;
    camera.position.z += (tgt.z - Math.cos(rot) * cd - camera.position.z) * .06;
    camera.position.y += (tgt.y + ch - camera.position.y) * .06;
    camera.lookAt(tgt.x, tgt.y + 3, tgt.z);
  }

  updateHUD(); drawMM();
  document.getElementById('cross').style.left = (mX - 8) + 'px';
  document.getElementById('cross').style.top = (mY - 8) + 'px';
  renderer.render(scene, camera);
}

// ═══ HUD ═══
function updateHUD() {
  const me = GS.players[myId]; if (!me) return;
  if (me.gold !== undefined) myGold = me.gold; if (me.ship) myShip = me.ship;
  document.getElementById('gold').textContent = `${myGold} Gold`;
  document.getElementById('hp-bar').style.width = (Math.max(0, me.hp) / (me.mhp || 100) * 100) + '%';
  document.getElementById('hp-text').textContent = `${Math.max(0, me.hp)}/${me.mhp || 100}`;
  document.getElementById('sails').style.display = me.onBoat ? 'block' : 'none';
  document.getElementById('sails').textContent = ['Stopped', 'Half Sail', 'Full Sail'][me.sails || 1];
  document.getElementById('lbl').textContent = me.onBoat ? (SHIPDEFS[me.ship]?.name || 'Boat') : me.swim ? 'Swimming!' : 'On Land [B=Shop]';
  const ap = document.getElementById('prompt');
  if (me.onBoat) { let nr = false; for (const i of ISL) if (Math.hypot(me.bx - i.x, me.bz - i.z) < i.r + 14) { nr = true; break; } ap.style.display = nr ? 'block' : 'none'; ap.textContent = 'Press E to disembark'; }
  else if (!me.swim) { ap.style.display = Math.hypot(me.cx - me.bx, me.cz - me.bz) < 18 ? 'block' : 'none'; ap.textContent = 'Press E to board'; }
  else ap.style.display = 'none';
  document.getElementById('pc').textContent = `${Object.keys(GS.players).length} online`;
  const sorted = Object.entries(GS.players).sort((a, b) => b[1].score - a[1].score).slice(0, 8);
  document.getElementById('slist').innerHTML = sorted.map(([id, p]) => `<div class="sr${id === myId ? ' me' : ''}"><span>${p.name}</span><span>${p.score}·${p.gold}g</span></div>`).join('');
}

// ═══ MINIMAP ═══
function drawMM() {
  const c = mmX, w = 200, h = 200, s = w / MAP;
  c.clearRect(0, 0, w, h); c.fillStyle = 'rgba(8,35,60,.9)'; c.fillRect(0, 0, w, h);
  c.strokeStyle = 'rgba(255,255,255,.05)'; c.lineWidth = 1;
  for (let i = 1; i < 4; i++) { const p = i * 50; c.beginPath(); c.moveTo(p, 0); c.lineTo(p, h); c.stroke(); c.beginPath(); c.moveTo(0, p); c.lineTo(w, p); c.stroke(); }
  c.fillStyle = '#4a8a3a';
  for (const i of ISL) { c.beginPath(); c.arc(w / 2 + i.x * s, h / 2 + i.z * s, Math.max(5, i.r * s), 0, Math.PI * 2); c.fill(); }
  c.fillStyle = 'rgba(255,255,255,.3)'; c.font = '7px sans-serif'; c.textAlign = 'center';
  for (const i of ISL) c.fillText(i.name || '', w / 2 + i.x * s, h / 2 + i.z * s + i.r * s + 9);
  for (const id in GS.players) {
    const p = GS.players[id], me = id === myId, px = w / 2 + p.bx * s, py = h / 2 + p.bz * s;
    c.fillStyle = me ? '#2ecc71' : '#e74c3c'; c.beginPath(); c.arc(px, py, me ? 4 : 2.5, 0, Math.PI * 2); c.fill();
    if (me) { const r = p.onBoat ? p.br : p.cr; c.strokeStyle = '#2ecc71'; c.lineWidth = 1.5; c.beginPath(); c.moveTo(px, py); c.lineTo(px + Math.sin(r) * 7, py + Math.cos(r) * 7); c.stroke(); }
  }
}
